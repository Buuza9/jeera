<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Djera Driver — Trip in progress</title>
  <link rel="stylesheet" href="../_shared/app.css" />
  <script src="../_shared/i18n.js"></script>
  <script src="../_shared/frame.js"></script>
  <script src="../_shared/map.js"></script>
  <style>
    .trip-screen { padding: 0; position: relative; overflow: hidden; }
    .map-fill { position: absolute; inset: 0; z-index: 0; isolation: isolate; }
    .map-fill .leaflet-container { width: 100%; height: 100%; }

    .mstrip { position: absolute; top: 70px; inset-inline: 18px; z-index: 30; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .mcard {
      padding: 10px 14px; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-md); box-shadow: var(--shadow-sm); backdrop-filter: blur(8px);
    }
    .mcard .v { font-size: 18px; font-weight: 700; margin-top: 2px; font-variant-numeric: tabular-nums; }
    .mcard .v .u { font-size: 11px; color: var(--text-muted); margin-inline-start: 3px; font-weight: 600; }

    .sheet {
      position: absolute; inset-inline: 0; bottom: 0; z-index: 20;
      background: var(--bg); border-radius: 28px 28px 0 0;
      padding: 8px 22px 30px; box-shadow: 0 -16px 40px rgba(20,18,12,.18);
      animation: sheet-up .42s var(--ease-spring) both;
    }
    .grabber { width: 44px; height: 5px; border-radius: 999px; background: var(--surface-3); margin: 4px auto 12px; }

    .stage-banner {
      padding: 10px 14px; margin-bottom: 14px; border-radius: var(--r-md);
      font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px;
      background: var(--brand-600); color: var(--text-onbrand);
    }
    .stage-banner .dot { width: 8px; height: 8px; border-radius: 50%; background: #fff; animation: pulse-ring 1.6s infinite; }

    .dest-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .dest-row .addr { font-size: 15.5px; font-weight: 600; margin-top: 2px; }
    .dest-row .fare { text-align: end; }
    .dest-row .fare .amt { font-size: 22px; font-weight: 700; color: var(--brand-700); font-variant-numeric: tabular-nums; }
    .dest-row .fare .amt .u { font-size: 12px; color: var(--text-muted); margin-inline-start: 3px; font-weight: 600; }
    .rider-mini { display: flex; gap: 12px; align-items: center; padding-top: 10px; border-top: 1px solid var(--hairline); }
    .rider-mini .av {
      width: 36px; height: 36px; border-radius: 50%; flex: 0 0 auto;
      background: var(--accent-500); color: var(--text-onbrand);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; font-family: var(--font-display);
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button data-toolbar-lang="en" onclick="I18N.setLang('en')">EN</button>
    <button data-toolbar-lang="ar" onclick="I18N.setLang('ar')">AR</button>
    <button data-toolbar-theme="light" onclick="I18N.setTheme('light')">☀︎</button>
    <button data-toolbar-theme="dark"  onclick="I18N.setTheme('dark')">☾</button>
    <a class="back" href="to-pickup.html">←</a>
  </div>

  <div class="stage">
    <div class="phone">
      <div class="screen trip-screen">
        <div class="map-fill"><div id="trip-map-el" style="width:100%;height:100%;"></div></div>

        <div class="mstrip">
          <div class="mcard">
            <div class="eyebrow" data-i18n="trip.remaining">Remaining</div>
            <div class="v"><span id="km-v">5.2</span><span class="u" data-i18n="unit.km">km</span></div>
          </div>
          <div class="mcard">
            <div class="eyebrow">ETA</div>
            <div class="v"><span id="eta-v">13</span><span class="u" data-i18n="unit.min">min</span></div>
          </div>
        </div>

        <div class="sheet">
          <div class="grabber"></div>
          <div class="stage-banner">
            <span class="dot"></span>
            <span data-i18n="trip.intrip.head">Trip in progress</span>
          </div>

          <div class="card">
            <div class="dest-row">
              <div>
                <div class="eyebrow" data-i18n="req.dest">Destination</div>
                <div class="addr" data-i18n="req.dest.addr">Gargaresh, Tripoli</div>
              </div>
              <div class="fare">
                <div class="eyebrow" data-i18n="req.fare">Fare</div>
                <div class="amt">25<span class="u" data-i18n="unit.currency">LYD</span></div>
              </div>
            </div>
            <div class="rider-mini">
              <span class="av">KA</span>
              <span class="small" data-i18n="trip.pickup.rider">Khalid Al-Asmari</span>
            </div>
          </div>

          <button class="btn btn-primary" style="margin-top:14px" onclick="location.href='complete.html'" data-i18n="trip.end">End trip</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    I18N.register({
      "trip.intrip.head":  { en: "Trip in progress",      ar: "الرحلة جارية" },
      "trip.remaining":    { en: "Remaining",             ar: "المتبقّي" },
      "req.dest":          { en: "Destination",           ar: "الوجهة" },
      "req.dest.addr":     { en: "Gargaresh, Tripoli",    ar: "قرقارش، طرابلس" },
      "req.fare":          { en: "Fare",                  ar: "الأجرة" },
      "trip.pickup.rider": { en: "Khalid Al-Asmari",      ar: "خالد العسماري" },
      "trip.end":          { en: "End trip",              ar: "إنهاء الرحلة" },
      "unit.km":           { en: "km",                    ar: "كم" },
      "unit.min":          { en: "min",                   ar: "دق" },
      "unit.currency":     { en: "LYD",                   ar: "د.ل" },
    });

    // Driver animates Hai al-Andalus → Gargaresh along the route.
    const ROUTE_WP = [JeeraMap.TRIPOLI.andalus, [32.861, 13.158], [32.853, 13.155], [32.845, 13.150], JeeraMap.TRIPOLI.gargaresh];
    JeeraMap.create('trip-map-el', {
      center: [32.855, 13.155], zoom: 14,
      onReady(map, L) {
        const driver = JeeraMap.pin(L, JeeraMap.TRIPOLI.andalus, 'driver', { pulse: true }).addTo(map);
        JeeraMap.pin(L, JeeraMap.TRIPOLI.gargaresh, 'dest', { label: I18N.t('req.dest') }).addTo(map);
        const route = JeeraMap.route(L, ROUTE_WP).addTo(map);
        map.fitBounds(route.getBounds().pad(0.25));
        setTimeout(() => JeeraMap.animateAlong(driver, ROUTE_WP, { map, durationMs: 13000 }), 900);
      },
    });

    // Remaining 5.2 km → 0.
    const kmV = document.getElementById('km-v');
    const etaV = document.getElementById('eta-v');
    let km = 5.2;
    (function tick() {
      km = Math.max(0, +(km - 0.4).toFixed(1));
      kmV.textContent = km.toFixed(1);
      etaV.textContent = String(Math.max(1, Math.ceil(km * 2.4)));
      if (km > 0) setTimeout(tick, 800);
    })();
  </script>
</body>
</html>
