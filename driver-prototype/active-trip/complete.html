<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Djera Driver — Trip complete</title>
  <link rel="stylesheet" href="../_shared/app.css" />
  <script src="../_shared/i18n.js"></script>
  <script src="../_shared/frame.js"></script>
  <style>
    .done-screen { padding-top: 80px; align-items: center; text-align: center; }
    .done-title { font-family: var(--font-display); font-size: 32px; font-weight: 600; letter-spacing: -0.035em; margin: 22px 0 0; }

    .fare-card {
      width: 100%; margin-top: 28px; padding: 22px; text-align: center;
      background: var(--brand-50);
      border: 1px solid oklch(from var(--brand-500) l c h / .35);
      border-radius: var(--r-md);
    }
    [data-theme="dark"] .fare-card { background: oklch(from var(--brand-500) l c h / .12); }
    .fare-card .eyebrow { margin-bottom: 6px; color: var(--brand-700); }
    .fare-card .amt {
      font-family: var(--font-display);
      font-size: 48px; font-weight: 600; letter-spacing: -0.04em; color: var(--brand-700);
      font-variant-numeric: tabular-nums;
    }
    .fare-card .amt .u { font-size: 18px; margin-inline-start: 6px; color: var(--text-muted); }

    .meta2 { width: 100%; margin-top: 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .mcard { padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); box-shadow: var(--shadow-sm); text-align: start; }
    .mcard .v { font-size: 18px; font-weight: 700; margin-top: 2px; font-variant-numeric: tabular-nums; }
    .mcard .v .u { font-size: 11px; color: var(--text-muted); margin-inline-start: 3px; font-weight: 600; }

    .comm-row { width: 100%; margin-top: 12px; background: var(--surface-2); border: 1px dashed var(--border); }
    .comm-row .row-ic { background: oklch(from var(--accent-600) l c h / .15); color: var(--accent-700); }
  </style>
</head>
<body>
  <div class="toolbar">
    <button data-toolbar-lang="en" onclick="I18N.setLang('en')">EN</button>
    <button data-toolbar-lang="ar" onclick="I18N.setLang('ar')">AR</button>
    <button data-toolbar-theme="light" onclick="I18N.setTheme('light')">☀︎</button>
    <button data-toolbar-theme="dark"  onclick="I18N.setTheme('dark')">☾</button>
    <a class="back" href="in-trip.html">←</a>
  </div>

  <div class="stage">
    <div class="phone">
      <div class="screen done-screen">
        <!-- Animated check ring -->
        <svg width="104" height="104" viewBox="0 0 104 104" style="display:block">
          <circle cx="52" cy="52" r="43.7" fill="none" stroke="var(--brand-100)" stroke-width="6.2"/>
          <circle cx="52" cy="52" r="43.7" fill="none" stroke="var(--brand-600)" stroke-width="6.2"
                  stroke-linecap="round" transform="rotate(-90 52 52)"
                  stroke-dasharray="274.6" style="--len:274.6; animation: draw-stroke .9s var(--ease-out) both"/>
          <path d="M 33.3 54.1 L 46.8 67.6 L 72.8 39.5" fill="none" stroke="var(--brand-600)" stroke-width="7.3"
                stroke-linecap="round" stroke-linejoin="round"
                stroke-dasharray="80" style="--len:80; animation: draw-stroke .35s .7s var(--ease-out) both"/>
        </svg>

        <h1 class="done-title" data-i18n="trip.done.title">Trip complete</h1>
        <p class="body" style="margin-top:6px" data-i18n="trip.done.sub">Safe trip, Ahmad.</p>

        <!-- Fare due -->
        <div class="fare-card">
          <div class="eyebrow" data-i18n="trip.due">Collect from rider</div>
          <div class="amt">25<span class="u" data-i18n="unit.currency">LYD</span></div>
          <span class="badge badge-brand" style="margin-top:8px">
            <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="6" width="19" height="12" rx="2"/><circle cx="12" cy="12" r="2.5"/><path d="M6 9.5h.01M18 14.5h.01"/></svg>
            <span data-i18n="trip.cash">Cash</span>
          </span>
        </div>

        <!-- Distance + duration -->
        <div class="meta2">
          <div class="mcard"><div class="eyebrow" data-i18n="trip.distance">Distance</div><div class="v">8.5<span class="u" data-i18n="unit.km">km</span></div></div>
          <div class="mcard"><div class="eyebrow" data-i18n="trip.duration">Duration</div><div class="v">18<span class="u" data-i18n="unit.min">min</span></div></div>
        </div>

        <!-- Commission accrual -->
        <div class="row comm-row">
          <div class="row-ic">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l10 18H2L12 3z"/><path d="M12 10v5M12 18h.01"/></svg>
          </div>
          <div class="row-text">
            <h4 data-i18n="trip.commission">Djera commission (−15%)</h4>
            <p><span data-i18n="trip.commission.amt">3.75 LYD added to outstanding</span></p>
          </div>
        </div>

        <div class="spacer"></div>
        <div class="stack stack-3" style="width:100%;margin-top:20px">
          <a class="btn btn-primary" href="../dashboard/index.html" data-i18n="trip.cash.received">Confirm cash received</a>
          <a class="btn btn-ghost" href="../trip-history/detail.html?id=1" data-i18n="trip.receipt">View trip receipt</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    I18N.register({
      "trip.done.title":    { en: "Trip complete",          ar: "اكتملت الرحلة" },
      "trip.done.sub":      { en: "Safe trip, Ahmad.",       ar: "رحلة موفّقة، أحمد." },
      "trip.due":           { en: "Collect from rider",      ar: "استلام من الراكب" },
      "trip.cash":          { en: "Cash",                    ar: "نقدًا" },
      "trip.distance":      { en: "Distance",                ar: "المسافة" },
      "trip.duration":      { en: "Duration",                ar: "المدة" },
      "trip.commission":    { en: "Djera commission (−15%)", ar: "عمولة دجيرا (−15%)" },
      "trip.commission.amt":{ en: "3.75 LYD added to outstanding", ar: "أُضيفت 3.75 د.ل إلى المستحقّ" },
      "trip.cash.received": { en: "Confirm cash received",   ar: "تأكيد استلام النقود" },
      "trip.receipt":       { en: "View trip receipt",       ar: "عرض إيصال الرحلة" },
      "unit.currency":      { en: "LYD",                     ar: "د.ل" },
      "unit.km":            { en: "km",                      ar: "كم" },
      "unit.min":           { en: "min",                     ar: "دق" },
    });
  </script>
</body>
</html>
