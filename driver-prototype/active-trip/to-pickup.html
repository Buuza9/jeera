<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Djera Driver — Heading to pickup</title>
  <link rel="stylesheet" href="../_shared/app.css" />
  <script src="../_shared/i18n.js"></script>
  <script src="../_shared/frame.js"></script>
  <script src="../_shared/map.js"></script>
  <style>
    .trip-screen { padding: 0; position: relative; overflow: hidden; }
    .map-fill { position: absolute; inset: 0; z-index: 0; isolation: isolate; }
    .map-fill .leaflet-container { width: 100%; height: 100%; }

    /* Top metrics strip */
    .mstrip { position: absolute; top: 70px; inset-inline: 18px; z-index: 30; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .mcard {
      padding: 10px 14px; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-md); box-shadow: var(--shadow-sm); backdrop-filter: blur(8px);
    }
    .mcard .v { font-size: 18px; font-weight: 700; margin-top: 2px; font-variant-numeric: tabular-nums; }
    .mcard .v .u { font-size: 11px; color: var(--text-muted); margin-inline-start: 3px; font-weight: 600; }

    /* Bottom sheet */
    .sheet {
      position: absolute; inset-inline: 0; bottom: 0; z-index: 20;
      background: var(--bg); border-radius: 28px 28px 0 0;
      padding: 8px 22px 30px; box-shadow: 0 -16px 40px rgba(20,18,12,.18);
      animation: sheet-up .42s var(--ease-spring) both;
    }
    .grabber { width: 44px; height: 5px; border-radius: 999px; background: var(--surface-3); margin: 4px auto 12px; }

    .stage-banner {
      padding: 10px 14px; margin-bottom: 14px; border-radius: var(--r-md);
      font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px;
      background: var(--brand-50); color: var(--brand-700);
    }
    [data-theme="dark"] .stage-banner { background: oklch(from var(--brand-500) l c h / .14); }
    .stage-banner .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--brand-600); animation: pulse-ring 1.6s infinite; }

    .rider-card { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .rider-card .av {
      width: 48px; height: 48px; border-radius: 50%; flex: 0 0 auto;
      background: var(--accent-500); color: var(--text-onbrand);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; font-family: var(--font-display);
    }
    .rider-card .who { flex: 1; min-width: 0; }
    .rider-card .who .n { font-size: 15.5px; font-weight: 600; }
    .rider-card .who .a { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
    .rider-card .call { background: var(--brand-50); border: 0; color: var(--brand-700); }
    [data-theme="dark"] .rider-card .call { background: oklch(from var(--brand-500) l c h / .15); }
  </style>
</head>
<body>
  <div class="toolbar">
    <button data-toolbar-lang="en" onclick="I18N.setLang('en')">EN</button>
    <button data-toolbar-lang="ar" onclick="I18N.setLang('ar')">AR</button>
    <button data-toolbar-theme="light" onclick="I18N.setTheme('light')">☀︎</button>
    <button data-toolbar-theme="dark"  onclick="I18N.setTheme('dark')">☾</button>
    <a class="back" href="../ride-requests/index.html">←</a>
  </div>

  <div class="stage">
    <div class="phone">
      <div class="screen trip-screen">
        <div class="map-fill"><div id="trip-map-el" style="width:100%;height:100%;"></div></div>

        <!-- Top metrics -->
        <div class="mstrip">
          <div class="mcard">
            <div class="eyebrow" data-i18n="req.toRider">To rider</div>
            <div class="v"><span id="dist-v">800</span><span class="u">m</span></div>
          </div>
          <div class="mcard">
            <div class="eyebrow">ETA</div>
            <div class="v"><span id="eta-v">5</span><span class="u" data-i18n="unit.min">min</span></div>
          </div>
        </div>

        <!-- Bottom sheet -->
        <div class="sheet">
          <div class="grabber"></div>
          <div class="stage-banner">
            <span class="dot"></span>
            <span data-i18n="trip.pickup.head">Heading to pickup</span>
          </div>

          <div class="card rider-card">
            <span class="av">KA</span>
            <div class="who">
              <div class="n" data-i18n="trip.pickup.rider">Khalid Al-Asmari</div>
              <div class="a" data-i18n="req.pickup.addr">Hai al-Andalus, Tripoli</div>
            </div>
            <button class="fab call" aria-label="Call">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3.1-8.6A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.4 1.8.7 2.7a2 2 0 0 1-.5 2.1L8 9.7a16 16 0 0 0 6 6l1.2-1.2a2 2 0 0 1 2.1-.5c.9.3 1.8.6 2.7.7a2 2 0 0 1 1.7 2.2z"/>
              </svg>
            </button>
          </div>

          <div class="btn-row">
            <button class="btn btn-secondary" data-i18n="trip.call">Call</button>
            <a class="btn btn-primary" id="arrived" style="flex:1.3;opacity:.5;pointer-events:none" href="in-trip.html">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 7"/></svg>
              <span data-i18n="trip.arrived">I've arrived</span>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    I18N.register({
      "trip.pickup.head":  { en: "Heading to pickup",        ar: "في الطريق إلى الراكب" },
      "trip.pickup.rider": { en: "Khalid Al-Asmari",         ar: "خالد العسماري" },
      "req.pickup.addr":   { en: "Hai al-Andalus, Tripoli",  ar: "حي الأندلس، طرابلس" },
      "req.toRider":       { en: "To rider",                 ar: "إلى الراكب" },
      "trip.call":         { en: "Call",                     ar: "اتصال" },
      "trip.arrived":      { en: "I've arrived",             ar: "وصلت" },
      "unit.min":          { en: "min",                      ar: "دق" },
    });

    // Real Tripoli map: driver animates toward the pickup along the route.
    const driverStart = [32.8780, 13.1700];
    const ROUTE_WP = [driverStart, [32.872, 13.165], [32.868, 13.158], [32.864, 13.152], JeeraMap.TRIPOLI.andalus];
    JeeraMap.create('trip-map-el', {
      center: [32.872, 13.160], zoom: 14,
      onReady(map, L) {
        const driver = JeeraMap.pin(L, driverStart, 'driver', { pulse: true }).addTo(map);
        JeeraMap.pin(L, JeeraMap.TRIPOLI.andalus, 'rider', { label: I18N.t('req.pickup.addr') }).addTo(map);
        const route = JeeraMap.route(L, ROUTE_WP).addTo(map);
        map.fitBounds(route.getBounds().pad(0.25));
        setTimeout(() => JeeraMap.animateAlong(driver, ROUTE_WP, { map, durationMs: 12000 }), 900);
      },
    });

    // Distance 800m → 0; "I've arrived" enables under ~150 m.
    const distV = document.getElementById('dist-v');
    const etaV  = document.getElementById('eta-v');
    const arrived = document.getElementById('arrived');
    let dist = 800;
    (function tick() {
      dist = Math.max(0, dist - 70);
      distV.textContent = String(dist);
      etaV.textContent = String(Math.max(1, Math.ceil(dist / 180)));
      if (dist <= 150) { arrived.style.opacity = '1'; arrived.style.pointerEvents = ''; }
      if (dist > 0) setTimeout(tick, 800);
    })();
  </script>
</body>
</html>
