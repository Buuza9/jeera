<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Jeera Driver — Sign in</title>
  <link rel="stylesheet" href="../_shared/app.css" />
  <script src="../_shared/i18n.js"></script>
  <script src="../_shared/frame.js"></script>
  <style>
    .auth-screen {
      padding: 88px 28px 32px;
      background:
        radial-gradient(420px 220px at 50% 0%, rgba(16,185,129,.16), transparent 70%),
        var(--bg);
    }
    .auth-head { text-align: center; }
    .auth-head .brand-mark { width: 72px; height: 72px; border-radius: 22px; font-size: 30px; margin-top: 4px; }
    .auth-title { font-size: 26px; font-weight: 700; margin: 14px 0 6px; letter-spacing: -0.02em; }
    .auth-tag   { font-size: 14.5px; color: var(--text-muted); margin: 0 0 24px; line-height: 1.5; }

    .method-tabs {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 4px;
      padding: 4px;
      background: var(--surface-2);
      border-radius: var(--radius);
      margin-bottom: 20px;
    }
    .method-tabs button {
      background: transparent; border: 0; cursor: pointer;
      padding: 10px 12px; border-radius: calc(var(--radius) - 4px);
      font-size: 14px; font-weight: 600; font-family: inherit;
      color: var(--text-muted);
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      transition: background .15s, color .15s, box-shadow .15s;
    }
    .method-tabs button svg { width: 16px; height: 16px; }
    .method-tabs button.active {
      background: var(--bg);
      color: var(--text);
      box-shadow: 0 1px 2px rgba(15,23,42,.06), 0 1px 1px rgba(15,23,42,.04);
    }
    [data-theme="dark"] .method-tabs button.active { box-shadow: 0 0 0 1px var(--border); }

    .method-pane { display: none; text-align: start; margin-bottom: 18px; }
    .method-pane.active { display: block; }
    .method-pane label {
      display: block; font-size: 13px; font-weight: 500;
      color: var(--text-muted); margin-bottom: 6px;
    }

    .phone-input {
      display: flex; align-items: stretch;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color .15s, box-shadow .15s;
    }
    .phone-input:focus-within {
      border-color: var(--brand-500);
      box-shadow: 0 0 0 3px rgba(16,185,129,.15);
    }
    .phone-prefix {
      display: flex; align-items: center; gap: 8px;
      padding: 0 14px;
      background: var(--surface-2);
      border-inline-end: 1px solid var(--border);
      font-size: 15px; font-weight: 600;
      color: var(--text);
      direction: ltr;
    }
    .phone-prefix .flag {
      width: 22px; height: 16px; border-radius: 3px;
      background: linear-gradient(to bottom, #e70013 33%, #000 33% 66%, #239e46 66%);
      flex: 0 0 auto;
    }
    .phone-input input {
      flex: 1; min-width: 0;
      padding: 13px 15px;
      background: transparent; border: 0; outline: none;
      color: var(--text);
      font-size: 16px; font-family: inherit;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
      direction: ltr; text-align: start;
    }
    .phone-input input::placeholder { color: var(--text-faint); }

    .email-input {
      width: 100%; padding: 13px 15px;
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-radius: var(--radius);
      font-size: 15px; font-family: inherit;
      outline: none; transition: border-color .15s, box-shadow .15s;
    }
    .email-input::placeholder { color: var(--text-faint); }
    .email-input:focus {
      border-color: var(--brand-500);
      box-shadow: 0 0 0 3px rgba(16,185,129,.15);
    }
    .field-err {
      display: none;
      font-size: 12px; color: #dc2626;
      margin-top: 6px;
    }
    .field-err.show { display: block; }

    .auth-help {
      font-size: 12.5px; color: var(--text-faint);
      margin: -2px 0 18px;
      line-height: 1.5;
    }

    .auth-newlink {
      margin-top: 18px;
      text-align: center;
      font-size: 14px;
      color: var(--text-muted);
    }
    .auth-newlink a {
      color: var(--brand-600);
      font-weight: 600;
      margin-inline-start: 4px;
    }

    .todo-chip {
      display: inline-flex; align-items: center; gap: 6px;
      margin: 18px auto 0;
      padding: 6px 12px;
      background: rgba(245,158,11,.12);
      color: var(--accent-600);
      border-radius: 999px;
      font-size: 11.5px; font-weight: 600;
    }
    .todo-chip::before {
      content: ""; width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent-600);
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button data-toolbar-lang="en" onclick="I18N.setLang('en')">EN</button>
    <button data-toolbar-lang="ar" onclick="I18N.setLang('ar')">AR</button>
    <button data-toolbar-theme="light" onclick="I18N.setTheme('light')">☀︎</button>
    <button data-toolbar-theme="dark"  onclick="I18N.setTheme('dark')">☾</button>
    <a class="back" href="../welcome/index.html">←</a>
  </div>

  <div class="stage">
    <div class="phone">
      <div class="screen auth-screen">
        <div class="auth-head">
          <div class="brand-mark">
            <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" width="34" height="34">
              <path d="M30 8 L30 30 a8 8 0 0 1 -16 0" />
              <path d="M22 8 L36 8" opacity=".75"/>
            </svg>
          </div>
          <h1 class="auth-title" data-i18n="auth.title">Jeera Driver</h1>
          <p class="auth-tag" data-i18n="auth.tag">Start your journey with us.</p>
        </div>

        <div class="method-tabs" role="tablist">
          <button type="button" id="tab-phone" class="active" role="tab" aria-selected="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 4h4l2 5-2.5 1.5a11 11 0 0 0 5 5L15 13l5 2v4a2 2 0 0 1-2 2A16 16 0 0 1 3 6a2 2 0 0 1 2-2z"/>
            </svg>
            <span data-i18n="auth.method.phone">Phone</span>
          </button>
          <button type="button" id="tab-email" role="tab" aria-selected="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="5" width="18" height="14" rx="2"/>
              <path d="M3 7l9 6 9-6"/>
            </svg>
            <span data-i18n="auth.method.email">Email</span>
          </button>
        </div>

        <div id="pane-phone" class="method-pane active">
          <label for="phone" data-i18n="auth.phone.label">Phone number</label>
          <div class="phone-input">
            <div class="phone-prefix">
              <span class="flag" aria-hidden="true"></span>
              <span>+218</span>
            </div>
            <input id="phone" type="tel" inputmode="numeric" autocomplete="tel-national"
                   placeholder="9X XXX XXXX" maxlength="11" />
          </div>
          <div class="field-err" id="err-phone" data-i18n="auth.phone.err">
            Enter a valid 9-digit Libyan number.
          </div>
        </div>

        <div id="pane-email" class="method-pane">
          <label for="email" data-i18n="auth.email.label">Email address</label>
          <input id="email" class="email-input" type="email" autocomplete="email"
                 placeholder="you@example.com" />
          <div class="field-err" id="err-email" data-i18n="auth.email.err">
            Enter a valid email address.
          </div>
        </div>

        <p class="auth-help" data-i18n="auth.help">
          We'll send a one-time code to verify it's you.
        </p>

        <button type="button" id="send-code" class="btn btn-primary" data-i18n="auth.send">Send code</button>

        <p class="auth-newlink">
          <span data-i18n="auth.new.q">New driver?</span>
          <a href="../enrollment/index.html" data-i18n="auth.new.cta">Register as a driver</a>
        </p>

        <div class="spacer"></div>

        <div style="text-align:center;">
          <span class="todo-chip" data-i18n="auth.todo">TODO §5 — PIN / biometric session lock scope</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    I18N.register({
      "auth.title":       { en: "Jeera Driver",                          ar: "سائقي جيرا" },
      "auth.tag":         { en: "Start your journey with us.",           ar: "ابدأ رحلتك معنا." },
      "auth.method.phone":{ en: "Phone",                                 ar: "الهاتف" },
      "auth.method.email":{ en: "Email",                                 ar: "البريد الإلكتروني" },
      "auth.phone.label": { en: "Phone number",                          ar: "رقم الهاتف" },
      "auth.phone.err":   { en: "Enter a valid 9-digit Libyan number.",  ar: "أدخل رقمًا ليبيًا صحيحًا من 9 أرقام." },
      "auth.email.label": { en: "Email address",                         ar: "البريد الإلكتروني" },
      "auth.email.err":   { en: "Enter a valid email address.",          ar: "أدخل بريدًا إلكترونيًا صحيحًا." },
      "auth.help":        { en: "We'll send a one-time code to verify it's you.",
                            ar: "سنرسل لك رمز تحقّق لمرّة واحدة." },
      "auth.send":        { en: "Send code",                             ar: "إرسال الرمز" },
      "auth.new.q":       { en: "New driver?",                           ar: "سائق جديد؟" },
      "auth.new.cta":     { en: "Register as a driver",                  ar: "التسجيل كسائق" },
      "auth.todo":        { en: "TODO §5 — PIN / biometric session lock scope",
                            ar: "TODO §5 — نطاق قفل الجلسة (PIN/البصمة)" },
    });

    // Method tab switching
    const tabPhone = document.getElementById('tab-phone');
    const tabEmail = document.getElementById('tab-email');
    const panePhone = document.getElementById('pane-phone');
    const paneEmail = document.getElementById('pane-email');

    function activate(method) {
      const phoneOn = method === 'phone';
      tabPhone.classList.toggle('active', phoneOn);
      tabEmail.classList.toggle('active', !phoneOn);
      tabPhone.setAttribute('aria-selected', String(phoneOn));
      tabEmail.setAttribute('aria-selected', String(!phoneOn));
      panePhone.classList.toggle('active', phoneOn);
      paneEmail.classList.toggle('active', !phoneOn);
      document.getElementById('err-phone').classList.remove('show');
      document.getElementById('err-email').classList.remove('show');
    }
    tabPhone.addEventListener('click', () => activate('phone'));
    tabEmail.addEventListener('click', () => activate('email'));

    // Phone auto-format 9X XXX XXXX
    const phoneInput = document.getElementById('phone');
    phoneInput.addEventListener('input', () => {
      const digits = phoneInput.value.replace(/\D/g, '').slice(0, 9);
      const parts = [digits.slice(0,2), digits.slice(2,5), digits.slice(5,9)].filter(Boolean);
      phoneInput.value = parts.join(' ');
    });

    // Send code → validate → /otp.html?via=phone|email&to=<identifier>
    document.getElementById('send-code').addEventListener('click', () => {
      const isPhone = tabPhone.classList.contains('active');
      if (isPhone) {
        const digits = phoneInput.value.replace(/\D/g, '');
        // Libyan mobile = 9 digits, must start with 9 (91/92/93/94)
        if (digits.length !== 9 || !digits.startsWith('9')) {
          document.getElementById('err-phone').classList.add('show');
          return;
        }
        location.href = `otp.html?via=phone&to=${encodeURIComponent('+218 ' + phoneInput.value)}`;
      } else {
        const email = document.getElementById('email').value.trim();
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          document.getElementById('err-email').classList.add('show');
          return;
        }
        location.href = `otp.html?via=email&to=${encodeURIComponent(email)}`;
      }
    });
  </script>
</body>
</html>
