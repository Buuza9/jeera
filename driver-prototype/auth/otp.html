<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Djera Driver — Verify code</title>
  <link rel="stylesheet" href="../_shared/app.css" />
  <script src="../_shared/i18n.js"></script>
  <script src="../_shared/frame.js"></script>
  <style>
    .otp-screen {
      padding: 88px 28px 32px;
      background:
        radial-gradient(420px 220px at 50% 0%, oklch(from var(--brand-500) l c h / .16), transparent 70%),
        var(--bg);
    }
    .otp-head { text-align: center; }
    .otp-icon {
      width: 64px; height: 64px; border-radius: 20px;
      background: var(--brand-50); color: var(--brand-600);
      display: inline-flex; align-items: center; justify-content: center;
      margin: 4px 0 14px;
    }
    [data-theme="dark"] .otp-icon { background: oklch(from var(--brand-500) l c h / .15); }
    .otp-icon svg { width: 30px; height: 30px; }
    .otp-title { font-size: 24px; font-weight: 700; margin: 0 0 6px; letter-spacing: -0.02em; }
    .otp-tag { font-size: 14.5px; color: var(--text-muted); margin: 0 0 6px; line-height: 1.5; }
    .otp-target { font-size: 15px; font-weight: 600; color: var(--text); margin: 0 0 24px; direction: ltr; }

    /* OTP boxes — always LTR per playbook §7 */
    .otp-boxes {
      display: grid; grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      margin-bottom: 16px;
      direction: ltr;
    }
    .otp-boxes input {
      width: 100%;
      aspect-ratio: 1 / 1.2;
      padding: 0;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 22px; font-weight: 700; font-family: inherit;
      font-variant-numeric: tabular-nums;
      text-align: center;
      outline: none;
      transition: border-color .15s, box-shadow .15s, background .15s;
    }
    .otp-boxes input:focus {
      border-color: var(--brand-500);
      box-shadow: 0 0 0 3px oklch(from var(--brand-500) l c h / .15);
    }
    .otp-boxes.shake { animation: shake .35s cubic-bezier(.36,.07,.19,.97); }
    .otp-boxes.error input {
      border-color: var(--danger);
      background: oklch(from var(--danger) l c h / .06);
    }
    @keyframes shake {
      10%, 90% { transform: translateX(-2px); }
      20%, 80% { transform: translateX(4px); }
      30%, 50%, 70% { transform: translateX(-6px); }
      40%, 60% { transform: translateX(6px); }
    }

    .otp-status {
      min-height: 18px;
      font-size: 12.5px; text-align: center;
      margin-bottom: 14px;
      color: var(--text-faint);
    }
    .otp-status.err { color: var(--danger); }
    .otp-status.ok  { color: var(--brand-700); }

    .otp-actions .btn + .btn { margin-top: 10px; }
    .btn[disabled] {
      opacity: .55;
      cursor: not-allowed;
      box-shadow: none;
    }

    .resend-row {
      text-align: center; font-size: 13.5px; color: var(--text-muted);
      margin-top: 18px;
    }
    .resend-row button {
      background: transparent; border: 0; cursor: pointer;
      color: var(--brand-600); font-weight: 600; font-family: inherit;
      font-size: 13.5px;
      padding: 0; margin-inline-start: 4px;
    }
    .resend-row button[disabled] {
      color: var(--text-faint);
      cursor: not-allowed;
    }

    .change-method {
      text-align: center; font-size: 13px; color: var(--text-muted);
      margin-top: 10px;
    }
    .change-method a { color: var(--brand-600); font-weight: 600; }

    /* Verifying overlay */
    .verifying {
      position: absolute; inset: 0;
      display: none;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 14px;
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      backdrop-filter: blur(6px);
      z-index: 40;
    }
    .verifying.show { display: flex; }
    .spinner {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 3px solid var(--border);
      border-top-color: var(--brand-500);
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .verifying p { margin: 0; font-size: 14px; font-weight: 600; color: var(--text); }

    .todo-chip {
      display: inline-flex; align-items: center; gap: 6px;
      margin: 18px auto 0;
      padding: 6px 12px;
      background: oklch(from var(--accent-600) l c h / .12);
      color: var(--accent-600);
      border-radius: 999px;
      font-size: 11.5px; font-weight: 600;
    }
    .todo-chip::before {
      content: ""; width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent-600);
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button data-toolbar-lang="en" onclick="I18N.setLang('en')">EN</button>
    <button data-toolbar-lang="ar" onclick="I18N.setLang('ar')">AR</button>
    <button data-toolbar-theme="light" onclick="I18N.setTheme('light')">☀︎</button>
    <button data-toolbar-theme="dark"  onclick="I18N.setTheme('dark')">☾</button>
    <a class="back" href="index.html">←</a>
  </div>

  <div class="stage">
    <div class="phone">
      <div class="screen otp-screen">
        <div class="otp-head">
          <div class="otp-icon" id="channel-icon">
            <!-- swapped at runtime: phone vs envelope -->
          </div>
          <h1 class="otp-title" data-i18n="otp.title">Enter verification code</h1>
          <p class="otp-tag" data-i18n="otp.tag">We sent a 6-digit code to</p>
          <p class="otp-target" id="target">—</p>
        </div>

        <div class="otp-boxes" id="otp-boxes">
          <input type="tel" inputmode="numeric" maxlength="1" autocomplete="one-time-code" />
          <input type="tel" inputmode="numeric" maxlength="1" />
          <input type="tel" inputmode="numeric" maxlength="1" />
          <input type="tel" inputmode="numeric" maxlength="1" />
          <input type="tel" inputmode="numeric" maxlength="1" />
          <input type="tel" inputmode="numeric" maxlength="1" />
        </div>

        <p class="otp-status" id="status" data-i18n="otp.hint">For this demo, code is 123456.</p>

        <div class="otp-actions">
          <button type="button" id="verify" class="btn btn-primary" disabled data-i18n="otp.verify">Verify</button>
        </div>

        <p class="resend-row">
          <span data-i18n="otp.resend.q">Didn't get the code?</span>
          <button type="button" id="resend" disabled>
            <span data-i18n="otp.resend.cta">Resend</span>
            <span id="countdown"> (30s)</span>
          </button>
        </p>

        <p class="change-method">
          <a href="index.html" data-i18n="otp.change">Use a different method</a>
        </p>

        <div class="spacer"></div>

        <div style="text-align:center;">
          <span class="todo-chip" data-i18n="otp.todo">TODO §2.2 — post-verify checks approval status (pending / approved / suspended)</span>
        </div>

        <div class="verifying" id="verifying">
          <div class="spinner" aria-hidden="true"></div>
          <p data-i18n="otp.verifying">Verifying…</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    I18N.register({
      "otp.title":      { en: "Enter verification code",  ar: "أدخل رمز التحقق" },
      "otp.tag":        { en: "We sent a 6-digit code to", ar: "أرسلنا رمزًا من 6 أرقام إلى" },
      "otp.hint":       { en: "For this demo, code is 123456.", ar: "في هذا العرض، الرمز هو 123456." },
      "otp.verify":     { en: "Verify",                   ar: "تحقّق" },
      "otp.verifying":  { en: "Verifying…",               ar: "جارٍ التحقّق…" },
      "otp.resend.q":   { en: "Didn't get the code?",     ar: "لم يصلك الرمز؟" },
      "otp.resend.cta": { en: "Resend",                   ar: "إعادة الإرسال" },
      "otp.change":     { en: "Use a different method",   ar: "استخدم طريقة أخرى" },
      "otp.err.bad":    { en: "Incorrect code. Try again.", ar: "رمز غير صحيح. حاول مرة أخرى." },
      "otp.err.short":  { en: "Enter all 6 digits.",      ar: "أدخل الأرقام الستة." },
      "otp.ok":         { en: "Verified — signing you in…", ar: "تم التحقّق — جارٍ تسجيل الدخول…" },
      "otp.todo":       { en: "TODO §2.2 — post-verify checks approval status (pending / approved / suspended)",
                          ar: "TODO §2.2 — بعد التحقّق نتحقّق من حالة الاعتماد (قيد المراجعة / معتمد / موقوف)" },
    });

    // ── Read query params ────────────────────────────────────────────
    const params = new URLSearchParams(location.search);
    const via = params.get('via') === 'email' ? 'email' : 'phone';
    const to  = params.get('to') || (via === 'phone' ? '+218 9X XXX XXXX' : 'you@example.com');
    document.getElementById('target').textContent = decodeURIComponent(to);

    // Swap channel icon
    const icon = document.getElementById('channel-icon');
    icon.innerHTML = via === 'phone'
      ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
           <rect x="6" y="2" width="12" height="20" rx="3"/><path d="M11 18h2"/>
         </svg>`
      : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
           <rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/>
         </svg>`;

    // ── OTP boxes ────────────────────────────────────────────────────
    const boxesEl = document.getElementById('otp-boxes');
    const boxes = Array.from(boxesEl.querySelectorAll('input'));
    const verifyBtn = document.getElementById('verify');
    const status = document.getElementById('status');

    function code() { return boxes.map(b => b.value).join(''); }
    function refreshState() {
      verifyBtn.disabled = code().length !== 6;
      if (boxesEl.classList.contains('error')) {
        boxesEl.classList.remove('error');
        status.classList.remove('err');
        status.textContent = I18N.t('otp.hint');
      }
    }

    boxes.forEach((box, i) => {
      box.addEventListener('input', (e) => {
        // Strip non-digits, keep only the last typed digit
        const d = e.target.value.replace(/\D/g, '').slice(-1);
        box.value = d;
        if (d && i < boxes.length - 1) boxes[i + 1].focus();
        refreshState();
        if (code().length === 6) verify();
      });
      box.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !box.value && i > 0) {
          boxes[i - 1].focus();
          boxes[i - 1].value = '';
          refreshState();
        }
      });
      box.addEventListener('paste', (e) => {
        const text = (e.clipboardData || window.clipboardData).getData('text');
        const digits = text.replace(/\D/g, '').slice(0, 6);
        if (!digits) return;
        e.preventDefault();
        digits.split('').forEach((c, k) => { if (boxes[k]) boxes[k].value = c; });
        const next = Math.min(digits.length, 5);
        boxes[next].focus();
        refreshState();
        if (code().length === 6) verify();
      });
    });
    boxes[0].focus();

    // ── Verify ───────────────────────────────────────────────────────
    function verify() {
      const c = code();
      if (c.length !== 6) {
        status.textContent = I18N.t('otp.err.short');
        status.classList.add('err');
        return;
      }
      // Mock: only 123456 succeeds. Real impl validates against backend.
      if (c !== '123456') {
        boxesEl.classList.add('error', 'shake');
        status.textContent = I18N.t('otp.err.bad');
        status.classList.add('err');
        setTimeout(() => boxesEl.classList.remove('shake'), 400);
        boxes.forEach(b => b.value = '');
        boxes[0].focus();
        refreshState();
        return;
      }
      // Success → brief verifying state → route forward.
      // Per §2.2 the next destination depends on approval status:
      //   pending  → ../enrollment/pending.html
      //   approved → ../dashboard/index.html  (not yet built)
      // For the mockup we assume "approved" and head to the dashboard.
      status.classList.remove('err');
      status.classList.add('ok');
      status.textContent = I18N.t('otp.ok');
      document.getElementById('verifying').classList.add('show');
      setTimeout(() => {
        location.href = `success.html?to=${encodeURIComponent(decodeURIComponent(to))}`;
      }, 900);
    }
    verifyBtn.addEventListener('click', verify);

    // ── Resend countdown ─────────────────────────────────────────────
    const resendBtn = document.getElementById('resend');
    const cdEl = document.getElementById('countdown');
    let cd = 30;
    function tick() {
      if (cd <= 0) {
        resendBtn.disabled = false;
        cdEl.textContent = '';
        return;
      }
      cdEl.textContent = ` (${cd}s)`;
      cd -= 1;
      setTimeout(tick, 1000);
    }
    tick();
    resendBtn.addEventListener('click', () => {
      if (resendBtn.disabled) return;
      cd = 30;
      resendBtn.disabled = true;
      tick();
      boxes.forEach(b => b.value = '');
      boxes[0].focus();
      status.classList.remove('err');
      status.textContent = I18N.t('otp.hint');
      refreshState();
    });

</script>
</body>
</html>
