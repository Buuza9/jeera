<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Djera Driver — Earnings</title>
  <link rel="stylesheet" href="../_shared/app.css" />
  <script src="../_shared/i18n.js"></script>
  <script src="../_shared/frame.js"></script>
  <script src="../_shared/navbar.js"></script>
  <style>
    .hero {
      padding: 22px; border-radius: var(--r-lg); position: relative; overflow: hidden;
      background: linear-gradient(140deg, var(--brand-600), var(--brand-700) 80%);
      color: var(--text-onbrand); box-shadow: var(--shadow-md);
    }
    .hero::after {
      content: ""; position: absolute; inset-inline-end: -30px; top: -30px;
      width: 160px; height: 160px; border-radius: 50%;
      background: oklch(from var(--accent-500) l c h / .18); filter: blur(20px);
    }
    .hero .eyebrow { color: oklch(from var(--brand-50) l c h / .8); }
    .hero .net {
      font-family: var(--font-display); font-size: 52px; font-weight: 600;
      letter-spacing: -0.04em; line-height: 1.05; margin-top: 6px; font-variant-numeric: tabular-nums;
    }
    .hero .net .u { font-size: 18px; margin-inline-start: 8px; opacity: .7; }
    .hero .delta {
      display: inline-flex; align-items: center; gap: 4px; margin-top: 12px;
      padding: 5px 12px; background: oklch(1 0 0 / .15); border-radius: 999px;
      font-size: 12px; font-weight: 700;
    }

    .chart { padding: 16px; }
    .bars { display: flex; align-items: flex-end; gap: 4px; height: 110px; margin-bottom: 8px; }
    .bars .bar { flex: 1; background: var(--brand-100); border-radius: 4px 4px 1px 1px; transition: height .4s var(--ease-out); transform-origin: bottom; }
    [data-theme="dark"] .bars .bar { background: oklch(from var(--brand-500) l c h / .25); }
    .bars .bar.hi { background: var(--brand-600); }
    .blabels { display: flex; gap: 4px; font-size: 10px; color: var(--text-faint); }
    .blabels span { flex: 1; text-align: center; }

    .stats2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .statc { padding: 14px; }
    .statc .eyebrow { font-size: 10px; }
    .statc .v { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin-top: 4px; font-variant-numeric: tabular-nums; }
    .statc .v .u { font-size: 11px; color: var(--text-muted); margin-inline-start: 4px; font-weight: 600; }
    .statc.warn .eyebrow, .statc.warn .v { color: var(--accent-700); }

    .brk-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .brk-list { padding: 4px; }
    .brk-row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; color: var(--text); text-decoration: none; }
    .brk-row + .brk-row { border-top: 1px solid var(--hairline); }
    .brk-row .t { font-size: 13.5px; font-weight: 600; }
    .brk-row .t .arr { color: var(--text-faint); }
    .brk-row .s { font-size: 11.5px; color: var(--text-faint); margin-top: 2px; }
    .brk-row .amt { font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .brk-row .amt .u { font-size: 10px; color: var(--text-muted); margin-inline-start: 3px; font-weight: 600; }
  </style>
</head>
<body data-nav="earnings">
  <div class="toolbar">
    <button data-toolbar-lang="en" onclick="I18N.setLang('en')">EN</button>
    <button data-toolbar-lang="ar" onclick="I18N.setLang('ar')">AR</button>
    <button data-toolbar-theme="light" onclick="I18N.setTheme('light')">☀︎</button>
    <button data-toolbar-theme="dark"  onclick="I18N.setTheme('dark')">☾</button>
    <a class="back" href="../dashboard/index.html">←</a>
  </div>

  <div class="stage">
    <div class="phone">
      <div class="screen">
        <div class="appbar">
          <a class="ab-btn" href="../dashboard/index.html" aria-label="Back">
            <svg class="chev chev-end" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg>
          </a>
          <div style="flex:1;min-width:0"><div class="ab-title" data-i18n="earn.title">Earnings</div></div>
        </div>

        <div class="stack stack-4" style="flex:1">
          <div class="segment" id="period">
            <button class="on" data-p="today" data-i18n="earn.today">Today</button>
            <button data-p="week" data-i18n="earn.week">This week</button>
            <button data-p="month" data-i18n="earn.month">This month</button>
          </div>

          <div class="hero">
            <div class="eyebrow" data-i18n="earn.net">Net earnings</div>
            <div class="net"><span id="net">320</span><span class="u" data-i18n="unit.currency">LYD</span></div>
            <span class="delta">↑ <span id="delta">+14% vs prev.</span></span>
          </div>

          <div class="card chart">
            <div class="bars" id="bars"></div>
            <div class="blabels" id="blabels"></div>
          </div>

          <div class="stats2">
            <div class="card statc"><div class="eyebrow" data-i18n="dash.trips">trips</div><div class="v" id="st-trips">15</div></div>
            <div class="card statc"><div class="eyebrow" data-i18n="earn.cash">Cash collected</div><div class="v"><span id="st-cash">376</span><span class="u" data-i18n="unit.currency">LYD</span></div></div>
            <div class="card statc"><div class="eyebrow" data-i18n="earn.online">Online hours</div><div class="v"><span id="st-hours">6.2</span><span class="u" data-i18n="unit.hr">h</span></div></div>
            <div class="card statc warn"><div class="eyebrow" data-i18n="earn.comm">Commission</div><div class="v"><span id="st-comm">56</span><span class="u" data-i18n="unit.currency">LYD</span></div></div>
          </div>

          <div>
            <div class="brk-head">
              <h3 class="h3" data-i18n="earn.breakdown">Trip breakdown</h3>
              <a class="btn btn-ghost btn-sm" style="width:auto" href="../trip-history/index.html">
                <span data-i18n="hist.title">Trip history</span>
                <svg class="chev-end" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
              </a>
            </div>
            <div class="card brk-list" id="brk"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    I18N.register({
      "earn.title":     { en: "Earnings",        ar: "الأرباح" },
      "earn.today":     { en: "Today",           ar: "اليوم" },
      "earn.week":      { en: "This week",       ar: "هذا الأسبوع" },
      "earn.month":     { en: "This month",      ar: "هذا الشهر" },
      "earn.net":       { en: "Net earnings",    ar: "صافي الأرباح" },
      "earn.cash":      { en: "Cash collected",  ar: "النقد المُحصّل" },
      "earn.online":    { en: "Online hours",    ar: "ساعات العمل" },
      "earn.comm":      { en: "Commission",      ar: "العمولة" },
      "earn.breakdown": { en: "Trip breakdown",  ar: "تفصيل الرحلات" },
      "earn.vs":        { en: "vs prev.",        ar: "عن السابق" },
      "hist.title":     { en: "Trip history",    ar: "سجل الرحلات" },
      "dash.trips":     { en: "trips",           ar: "رحلة" },
      "unit.currency":  { en: "LYD",             ar: "د.ل" },
      "unit.hr":        { en: "h",               ar: "س" },
      "unit.km":        { en: "km",              ar: "كم" },
    });

    const DATA = {
      today: { net: 320, prev: 14, trips: 15, cash: 376, hours: 6.2, comm: 56, hi: 6,
        bars: [12,24,18,32,40,36,52,48,28,22,18,14],
        labels: ["6","","8","","10","","12","","14","","16","18"],
        rows: [
          { from: "Hai al-Andalus", to: "Gargaresh", sub: "18:32 · 8.5 km", lyd: 25 },
          { from: "Old City", to: "MJI Airport", sub: "16:14 · 14.2 km", lyd: 42 },
          { from: "Dahra", to: "Janzour", sub: "13:45 · 11.0 km", lyd: 32 },
          { from: "Souq al-Juma", to: "Hai al-Andalus", sub: "11:22 · 5.8 km", lyd: 18 },
        ] },
      week: { net: 1840, prev: 8, trips: 78, cash: 2165, hours: 38, comm: 325, hi: 5,
        bars: [220,285,310,270,295,330,130],
        labels: ["Sat","Sun","Mon","Tue","Wed","Thu","Fri"],
        rows: [
          { from: "Saturday", sub: "9 trips · 38 km", lyd: 220 },
          { from: "Sunday", sub: "12 trips · 52 km", lyd: 285 },
          { from: "Monday", sub: "14 trips · 61 km", lyd: 310 },
          { from: "Tuesday", sub: "11 trips · 45 km", lyd: 270 },
        ] },
      month: { net: 7240, prev: 12, trips: 312, cash: 8520, hours: 156, comm: 1280, hi: 2,
        bars: [1620,1840,1980,1800],
        labels: ["W1","W2","W3","W4"],
        rows: [
          { from: "Week 1", sub: "72 trips · 308 km", lyd: 1620 },
          { from: "Week 2", sub: "78 trips · 342 km", lyd: 1840 },
          { from: "Week 3", sub: "84 trips · 364 km", lyd: 1980 },
        ] },
    };

    const $ = (id) => document.getElementById(id);
    let period = 'today';

    function render() {
      const d = DATA[period];
      $('net').textContent = d.net.toLocaleString();
      $('delta').textContent = `+${d.prev}% ${I18N.t('earn.vs')}`;
      $('st-trips').textContent = d.trips;
      $('st-cash').textContent = d.cash.toLocaleString();
      $('st-hours').textContent = d.hours;
      $('st-comm').textContent = d.comm.toLocaleString();

      const max = Math.max(...d.bars);
      $('bars').innerHTML = d.bars.map((v, i) =>
        `<div class="bar${i === d.hi ? ' hi' : ''}" style="height:${(v / max) * 100}%"></div>`).join('');
      $('blabels').innerHTML = d.labels.map((l) => `<span>${l}</span>`).join('');

      const cur = I18N.t('unit.currency'), km = I18N.t('unit.km');
      $('brk').innerHTML = d.rows.map((r) => {
        const title = r.to ? `${r.from} <span class="arr">→</span> ${r.to}` : r.from;
        const e = encodeURIComponent;
        const href = (period === 'today' && r.to)
          ? `../trip-history/detail.html?from=${e(r.from)}&to=${e(r.to)}&time=${e(r.sub.split(' · ')[0])}&km=${r.sub.split(' · ')[1].replace(' km','')}&lyd=${r.lyd}&rider=Khalid%20A.`
          : null;
        const tag = href ? 'a' : 'div';
        const attr = href ? ` href="${href}"` : '';
        return `<${tag} class="brk-row"${attr}>
          <div style="flex:1;min-width:0">
            <div class="t">${title}</div>
            <div class="s">${r.sub}</div>
          </div>
          <div class="amt">${r.lyd.toLocaleString()}<span class="u">${cur}</span></div>
        </${tag}>`;
      }).join('');
    }

    document.querySelectorAll('#period button').forEach((b) => {
      b.addEventListener('click', () => {
        document.querySelectorAll('#period button').forEach((x) => x.classList.toggle('on', x === b));
        period = b.dataset.p;
        render();
      });
    });
    const _setLang = I18N.setLang.bind(I18N);
    I18N.setLang = (l) => { _setLang(l); render(); };
    render();
  </script>
</body>
</html>
