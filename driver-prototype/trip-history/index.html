<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Djera Driver — Trip history</title>
  <link rel="stylesheet" href="../_shared/app.css" />
  <script src="../_shared/i18n.js"></script>
  <script src="../_shared/frame.js"></script>
  <script src="../_shared/navbar.js"></script>
  <style>
    .stats3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .statc { padding: 14px; }
    .statc .v { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin-top: 4px; font-variant-numeric: tabular-nums; }
    .statc .v .u { font-size: 11px; color: var(--text-muted); margin-inline-start: 4px; font-weight: 600; }

    .searchbar { position: relative; }
    .searchbar .ic { position: absolute; inset-inline-start: 14px; top: 50%; transform: translateY(-50%); color: var(--text-faint); display: flex; }
    .searchbar input {
      width: 100%; padding: 12px 14px; padding-inline-start: 42px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--r-md); font-size: 14px; font-family: inherit; color: var(--text); outline: none;
    }
    .searchbar input::placeholder { color: var(--text-faint); }

    .day-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; padding: 0 4px; }
    .day-head .tot { font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .day-head .tot .u { font-size: 10px; color: var(--text-muted); margin-inline-start: 3px; font-weight: 600; }

    .tcard { display: flex; flex-direction: column; gap: 8px; padding: 14px; cursor: pointer; color: var(--text); text-decoration: none; }
    .tcard.cancelled { opacity: .7; cursor: default; }
    .tcard .top { display: flex; align-items: stretch; gap: 12px; }
    .tcard .pins { display: flex; flex-direction: column; align-items: center; flex: 0 0 auto; padding: 4px 0; }
    .tcard .pins .from { width: 10px; height: 10px; border-radius: 50%; background: var(--brand-600); flex: 0 0 auto; }
    .tcard .pins .line { width: 2px; flex: 1; min-height: 14px; background: var(--border); margin: 4px 0; }
    .tcard .pins .to { width: 10px; height: 10px; border-radius: 2px; background: var(--terra-500); flex: 0 0 auto; }
    .tcard .addrs { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: space-between; gap: 12px; }
    .tcard .addrs .a { font-size: 14px; font-weight: 600; line-height: 1.35; }
    .tcard .end { text-align: end; display: flex; flex-direction: column; justify-content: space-between; align-items: flex-end; flex: 0 0 auto; }
    .tcard .fare { font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .tcard.cancelled .fare { text-decoration: line-through; color: var(--text-faint); }
    .tcard .fare .u { font-size: 10px; color: var(--text-muted); margin-inline-start: 3px; font-weight: 600; }
    .tcard .end .chev { color: var(--text-faint); }
    [dir="rtl"] .tcard .end .chev svg { transform: scaleX(-1); }
    .tcard .meta { padding-inline-start: 22px; display: flex; gap: 8px; font-size: 11.5px; color: var(--text-faint); }

    .empty { text-align: center; padding: 40px 0; color: var(--text-faint); }
    .empty .t { margin-top: 12px; font-size: 14px; }
  </style>
</head>
<body data-nav="trips">
  <div class="toolbar">
    <button data-toolbar-lang="en" onclick="I18N.setLang('en')">EN</button>
    <button data-toolbar-lang="ar" onclick="I18N.setLang('ar')">AR</button>
    <button data-toolbar-theme="light" onclick="I18N.setTheme('light')">☀︎</button>
    <button data-toolbar-theme="dark"  onclick="I18N.setTheme('dark')">☾</button>
    <a class="back" href="../dashboard/index.html">←</a>
  </div>

  <div class="stage">
    <div class="phone">
      <div class="screen">
        <div class="appbar">
          <a class="ab-btn" href="../dashboard/index.html" aria-label="Back">
            <svg class="chev chev-end" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg>
          </a>
          <div style="flex:1;min-width:0"><div class="ab-title" data-i18n="hist.title">Trip history</div></div>
        </div>

        <div class="stack stack-4" style="flex:1">
          <div class="stats3">
            <div class="card statc"><div class="eyebrow" style="font-size:10" data-i18n="dash.trips">trips</div><div class="v">15</div></div>
            <div class="card statc"><div class="eyebrow" style="font-size:10" data-i18n="earn.cash">Cash collected</div><div class="v">376<span class="u" data-i18n="unit.currency">LYD</span></div></div>
            <div class="card statc"><div class="eyebrow" style="font-size:10" data-i18n="earn.online">Online hours</div><div class="v">6.2<span class="u" data-i18n="unit.hr">h</span></div></div>
          </div>

          <div class="searchbar">
            <span class="ic"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg></span>
            <input id="q" type="search" autocomplete="off" placeholder="Search rider, place…" data-i18n-placeholder="hist.search.ph" />
          </div>

          <div class="segment" id="filter">
            <button class="on" data-f="all" data-i18n="hist.all">All</button>
            <button data-f="today" data-i18n="hist.today">Today</button>
            <button data-f="yesterday" data-i18n="hist.yesterday">Yesterday</button>
          </div>

          <div id="list" class="stack stack-4"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    I18N.register({
      "hist.title":      { en: "Trip history",          ar: "سجل الرحلات" },
      "hist.search.ph":  { en: "Search rider, place…",  ar: "ابحث عن راكب أو مكان…" },
      "hist.all":        { en: "All",                   ar: "الكل" },
      "hist.today":      { en: "Today",                 ar: "اليوم" },
      "hist.yesterday":  { en: "Yesterday",             ar: "أمس" },
      "hist.empty":      { en: "No trips match",        ar: "لا توجد رحلات مطابقة" },
      "hist.cancelled":  { en: "Cancelled",             ar: "ملغاة" },
      "dash.trips":      { en: "trips",                 ar: "رحلة" },
      "earn.cash":       { en: "Cash collected",        ar: "النقد المُحصّل" },
      "earn.online":     { en: "Online hours",          ar: "ساعات العمل" },
      "unit.currency":   { en: "LYD",                   ar: "د.ل" },
      "unit.km":         { en: "km",                    ar: "كم" },
      "unit.hr":         { en: "h",                     ar: "س" },
    });

    const TRIPS = [
      { day: "today", time: "18:32", from: "Hai al-Andalus", to: "Gargaresh", rider: "Khalid A.", km: 8.5, lyd: 25 },
      { day: "today", time: "16:14", from: "Old City", to: "MJI Airport", rider: "Mariam S.", km: 14.2, lyd: 42 },
      { day: "today", time: "13:45", from: "Dahra", to: "Janzour", rider: "Omar B.", km: 11.0, lyd: 32 },
      { day: "today", time: "11:22", from: "Souq al-Juma", to: "Hai al-Andalus", rider: "Yousef R.", km: 5.8, lyd: 18 },
      { day: "today", time: "10:08", from: "Sidi Husayn", to: "Tajura", rider: "Faisal M.", km: 12.5, lyd: 36, cancelled: true },
      { day: "yesterday", time: "20:11", from: "Gargaresh", to: "Old City", rider: "Layla N.", km: 9.2, lyd: 28 },
      { day: "yesterday", time: "17:30", from: "MJI Airport", to: "Hai al-Andalus", rider: "Ibrahim T.", km: 17.5, lyd: 48 },
      { day: "yesterday", time: "14:55", from: "Janzour", to: "Dahra", rider: "Salim K.", km: 10.8, lyd: 30 },
    ];

    const CHEV = '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>';
    const listEl = document.getElementById('list');
    const qEl = document.getElementById('q');
    let filter = 'all';

    function dayLabel(d) { return d === 'today' ? I18N.t('hist.today') : I18N.t('hist.yesterday'); }

    function render() {
      const query = qEl.value.trim().toLowerCase();
      const rows = TRIPS.filter((tr) => {
        if (filter !== 'all' && tr.day !== filter) return false;
        if (query && !`${tr.from} ${tr.to} ${tr.rider}`.toLowerCase().includes(query)) return false;
        return true;
      });
      const days = [...new Set(rows.map((tr) => tr.day))];
      if (rows.length === 0) {
        listEl.innerHTML = `<div class="empty"><svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg><div class="t">${I18N.t('hist.empty')}</div></div>`;
        return;
      }
      const cur = I18N.t('unit.currency'), km = I18N.t('unit.km');
      listEl.innerHTML = days.map((day) => {
        const dt = rows.filter((tr) => tr.day === day);
        const total = dt.reduce((s, tr) => s + (tr.cancelled ? 0 : tr.lyd), 0);
        const cards = dt.map((tr) => {
          const e = encodeURIComponent;
          const href = `detail.html?from=${e(tr.from)}&to=${e(tr.to)}&time=${e(tr.time)}&km=${tr.km}&lyd=${tr.lyd}&rider=${e(tr.rider)}`;
          const right = tr.cancelled
            ? `<span class="badge badge-danger" style="font-size:10">${I18N.t('hist.cancelled')}</span>`
            : `<span class="chev">${CHEV}</span>`;
          const tag = tr.cancelled ? 'div' : 'a';
          const attr = tr.cancelled ? '' : ` href="${href}"`;
          return `<${tag} class="card tcard${tr.cancelled ? ' cancelled' : ''}"${attr}>
            <div class="top">
              <div class="pins"><span class="from"></span><span class="line"></span><span class="to"></span></div>
              <div class="addrs">
                <div class="a">${tr.from}</div>
                <div class="a">${tr.to}</div>
              </div>
              <div class="end">
                <div class="fare">${tr.lyd}<span class="u">${cur}</span></div>
                ${right}
              </div>
            </div>
            <div class="meta"><span>${tr.time}</span><span>·</span><span>${tr.km} ${km}</span><span>·</span><span>${tr.rider}</span></div>
          </${tag}>`;
        }).join('');
        return `<div>
          <div class="day-head"><span class="eyebrow">${dayLabel(day)} · ${dt.length}</span><span class="tot">${total}<span class="u">${cur}</span></span></div>
          <div class="stack stack-2">${cards}</div>
        </div>`;
      }).join('');
    }

    document.querySelectorAll('#filter button').forEach((b) => {
      b.addEventListener('click', () => {
        document.querySelectorAll('#filter button').forEach((x) => x.classList.toggle('on', x === b));
        filter = b.dataset.f;
        render();
      });
    });
    qEl.addEventListener('input', render);
    const _setLang = I18N.setLang.bind(I18N);
    I18N.setLang = (l) => { _setLang(l); render(); };
    render();
  </script>
</body>
</html>
