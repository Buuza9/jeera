<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Djera Driver — Commission</title>
  <link rel="stylesheet" href="../_shared/app.css" />
  <script src="../_shared/i18n.js"></script>
  <script src="../_shared/frame.js"></script>
  <script src="../_shared/navbar.js"></script>
  <style>
    .bal-hero {
      padding: 22px; border-radius: var(--r-lg); position: relative; overflow: hidden;
      background: linear-gradient(140deg, var(--accent-500), oklch(from var(--accent-700) calc(l - 0.05) c h) 90%);
      color: var(--text-onbrand);
      box-shadow: 0 12px 30px oklch(from var(--accent-600) l c h / .3);
    }
    .bal-hero .eyebrow { color: oklch(1 0 0 / .8); }
    .bal-hero .bal {
      font-family: var(--font-display); font-size: 56px; font-weight: 600;
      letter-spacing: -0.04em; line-height: 1.05; margin-top: 4px; font-variant-numeric: tabular-nums;
    }
    .bal-hero .bal .u { font-size: 18px; opacity: .75; margin-inline-start: 6px; }
    .bal-hero .capbar { height: 6px; background: oklch(1 0 0 / .25); border-radius: 999px; overflow: hidden; margin-top: 14px; }
    .bal-hero .capbar i { display: block; height: 100%; background: #fff; border-radius: 999px; }
    .bal-hero .capnote { font-size: 11.5px; margin-top: 6px; opacity: .85; font-weight: 600; }

    .info-top { display: flex; justify-content: space-between; padding: 4px 4px 12px; }
    .info-top .v { font-size: 16px; font-weight: 700; margin-top: 4px; }
    .info-policy { border-top: 1px solid var(--hairline); padding-top: 12px; color: var(--text-muted); font-size: 13px; line-height: 1.45; }

    .acc-list { padding: 4px; }
    .acc-row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; }
    .acc-row + .acc-row { border-top: 1px solid var(--hairline); }
    .acc-row .ic {
      width: 32px; height: 32px; border-radius: 8px; flex: 0 0 auto;
      background: oklch(from var(--accent-600) l c h / .12); color: var(--accent-700);
      display: flex; align-items: center; justify-content: center;
    }
    .acc-row .body { flex: 1; min-width: 0; }
    .acc-row .body .t { font-size: 13.5px; font-weight: 600; }
    .acc-row .body .s { font-size: 11.5px; color: var(--text-faint); margin-top: 2px; }
    .acc-row .amt { font-size: 14px; font-weight: 700; color: var(--accent-700); font-variant-numeric: tabular-nums; }
    .acc-row .amt .u { font-size: 10px; margin-inline-start: 3px; font-weight: 600; }
  </style>
</head>
<body data-nav="home">
  <div class="toolbar">
    <button data-toolbar-lang="en" onclick="I18N.setLang('en')">EN</button>
    <button data-toolbar-lang="ar" onclick="I18N.setLang('ar')">AR</button>
    <button data-toolbar-theme="light" onclick="I18N.setTheme('light')">☀︎</button>
    <button data-toolbar-theme="dark"  onclick="I18N.setTheme('dark')">☾</button>
    <a class="back" href="../dashboard/index.html">←</a>
  </div>

  <div class="stage">
    <div class="phone">
      <div class="screen">
        <div class="appbar">
          <a class="ab-btn" href="../dashboard/index.html" aria-label="Back">
            <svg class="chev chev-end" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg>
          </a>
          <div style="flex:1;min-width:0"><div class="ab-title" data-i18n="com.title">Commission</div></div>
        </div>

        <div class="stack stack-4" style="flex:1">
          <!-- Balance hero -->
          <div class="bal-hero">
            <div class="eyebrow" data-i18n="com.outstanding">Outstanding balance</div>
            <div class="bal">48<span class="u" data-i18n="unit.currency">LYD</span></div>
            <div class="capbar"><i style="width:24%"></i></div>
            <div class="capnote" data-i18n="com.cap">48 of 200 LYD cap</div>
          </div>

          <!-- Settlement info -->
          <div class="card">
            <div class="info-top">
              <div>
                <div class="eyebrow" data-i18n="com.next">Next settlement</div>
                <div class="v" data-i18n="com.next.val">Sunday · in 4 days</div>
              </div>
              <span class="badge badge-warn" data-i18n="com.rate">Rate · 15%</span>
            </div>
            <div class="info-policy">
              <span data-i18n="com.policy">Auto-suspend after 200 LYD cap</span>
              <span class="todo-chip" style="margin-inline-start:4px">TODO §5</span>
            </div>
          </div>

          <!-- Recent accruals -->
          <div>
            <h3 class="h3" style="margin-bottom:10px" data-i18n="com.recent">Recent accruals</h3>
            <div class="card acc-list" id="acc"></div>
          </div>
        </div>

        <div class="action-bar">
          <div class="btn-row">
            <a class="btn btn-secondary" href="history.html" data-i18n="com.history">Settlement history</a>
            <a class="btn btn-primary" style="flex:1.3" href="settle.html" data-i18n="com.settle">Settle now</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    I18N.register({
      "com.title":       { en: "Commission",                 ar: "العمولة" },
      "com.outstanding": { en: "Outstanding balance",        ar: "الرصيد المستحق" },
      "com.cap":         { en: "48 of 200 LYD cap",          ar: "48 من سقف 200 د.ل" },
      "com.next":        { en: "Next settlement",            ar: "التسوية القادمة" },
      "com.next.val":    { en: "Sunday · in 4 days",         ar: "الأحد · خلال 4 أيام" },
      "com.rate":        { en: "Rate · 15%",                 ar: "النسبة · ١٥٪" },
      "com.policy":      { en: "Auto-suspend after 200 LYD cap", ar: "تعليق تلقائي عند تجاوز ٢٠٠ د.ل" },
      "com.recent":      { en: "Recent accruals",            ar: "أحدث الاستحقاقات" },
      "com.settle":      { en: "Settle now",                 ar: "سدّد الآن" },
      "com.history":     { en: "Settlement history",         ar: "سجل التسويات" },
      "com.fare":        { en: "fare",                       ar: "أجرة" },
      "unit.currency":   { en: "LYD",                        ar: "د.ل" },
    });

    const PLUS = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>';
    const ACC = [
      { trip: "Hai al-Andalus → Gargaresh", fare: 25, com: 3.75, time: "Today 18:32" },
      { trip: "Old City → MJI Airport", fare: 42, com: 6.30, time: "Today 16:14" },
      { trip: "Dahra → Janzour", fare: 32, com: 4.80, time: "Today 13:45" },
      { trip: "Souq al-Juma → Hai al-Andalus", fare: 18, com: 2.70, time: "Today 11:22" },
    ];
    function renderAcc() {
      const cur = I18N.t('unit.currency'), fare = I18N.t('com.fare');
      document.getElementById('acc').innerHTML = ACC.map((it) =>
        `<div class="acc-row">
          <span class="ic">${PLUS}</span>
          <div class="body"><div class="t">${it.trip}</div><div class="s">${it.time} · ${it.fare} ${cur} ${fare}</div></div>
          <div class="amt">+${it.com.toFixed(2)}<span class="u">${cur}</span></div>
        </div>`).join('');
    }
    const _setLang = I18N.setLang.bind(I18N);
    I18N.setLang = (l) => { _setLang(l); renderAcc(); };
    renderAcc();
  </script>
</body>
</html>
