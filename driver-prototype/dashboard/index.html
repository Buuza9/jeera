<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Jeera Driver — Dashboard</title>
  <link rel="stylesheet" href="../_shared/app.css" />
  <script src="../_shared/i18n.js"></script>
  <script src="../_shared/frame.js"></script>
  <script src="../_shared/navbar.js"></script>
  <script src="../_shared/map.js"></script>
  <style>
    /* Full-bleed map dashboard — map fills the phone, controls float on top. */
    .dash-screen { padding: 0; gap: 0; position: relative; overflow: hidden; }

    /* Map fills everything. isolation:isolate keeps Leaflet's panes (z 200–700)
       inside their own stacking context, BELOW the status bar (z 31). */
    .map-fill {
      position: absolute; inset: 0; z-index: 0;
      isolation: isolate;
    }
    .map-fill .leaflet-container { width: 100%; height: 100%; }

    /* ── Top-left controls ───────────────────────────────────── */
    .map-corner {
      position: absolute; top: 64px; inset-inline-start: 14px; z-index: 20;
      display: flex; gap: 8px;
    }

    /* Online control — single status pill, absolutely centred at top.
       Default Offline; tapping animates it to Online (label slides up,
       pill morphs grey → green). Only one status shows at a time. */
    .go-pill {
      position: absolute; top: 62px; left: 50%;
      transform: translateX(-50%); z-index: 20;
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border: 0; border-radius: 999px;
      background: rgba(255,255,255,.96);
      box-shadow: 0 8px 20px rgba(15,23,42,.2);
      backdrop-filter: blur(10px);
      color: var(--text); cursor: pointer; font-family: inherit;
      transition: background .35s, color .35s, box-shadow .35s, transform .12s;
    }
    [data-theme="dark"] .go-pill { background: rgba(31,41,55,.96); color: #f8fafc; }
    .go-pill:active { transform: translateX(-50%) scale(.95); }

    .go-pill .go-dot {
      width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto;
      background: var(--text-faint);
      transition: background .35s, box-shadow .35s;
    }
    /* a fixed-height window; the track slides to reveal one label at a time */
    .go-pill .go-label {
      height: 18px; overflow: hidden;
      font-size: 13.5px; font-weight: 700; letter-spacing: -0.01em;
    }
    .go-pill .go-track {
      display: flex; flex-direction: column;
      transition: transform .35s cubic-bezier(.34,1.25,.5,1);
    }
    .go-pill .go-track > span {
      height: 18px; line-height: 18px; text-align: center;
    }

    /* ON state */
    .go-pill[data-state="on"] {
      background: linear-gradient(135deg, var(--brand-500), var(--brand-600));
      color: #fff;
      box-shadow: 0 10px 26px rgba(16,185,129,.45);
    }
    .go-pill[data-state="on"] .go-track { transform: translateY(-18px); }
    .go-pill[data-state="on"] .go-dot {
      background: #fff; box-shadow: 0 0 0 3px rgba(255,255,255,.35);
      animation: godot 1.7s ease-out infinite;
    }
    @keyframes godot {
      0%   { box-shadow: 0 0 0 0 rgba(255,255,255,.6); }
      70%  { box-shadow: 0 0 0 6px rgba(255,255,255,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
    }

    .bell-dot { position: relative; }
    .bell-dot::after {
      content: ""; position: absolute; top: 9px; inset-inline-end: 11px;
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent-600); border: 2px solid white;
    }
    [data-theme="dark"] .bell-dot::after { border-color: #1f2937; }

    /* ── Bottom dock (earnings + commission) above the navbar ── */
    .map-dock {
      position: absolute; inset-inline: 14px; bottom: 88px; z-index: 20;
      display: flex; align-items: stretch;
      background: rgba(255,255,255,.96);
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(15,23,42,.18);
      backdrop-filter: blur(8px);
      overflow: hidden;
    }
    [data-theme="dark"] .map-dock { background: rgba(31,41,55,.96); }
    .dock-cell {
      flex: 1; min-width: 0;
      padding: 13px 15px; text-decoration: none; color: var(--text);
      display: flex; flex-direction: column; gap: 2px;
    }
    .dock-cell + .dock-cell { border-inline-start: 1px solid var(--border); }
    [data-theme="dark"] .dock-cell { color: #f8fafc; }
    .dock-cell .l {
      font-size: 10.5px; font-weight: 700; color: var(--text-muted);
      letter-spacing: 0.05em; text-transform: uppercase;
      display: flex; align-items: center; gap: 6px;
    }
    .dock-cell .v {
      font-size: 18px; font-weight: 800; letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
    }
    .dock-cell .v .unit { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-inline-start: 3px; }
    .dock-cell .sub { font-size: 11px; color: var(--text-muted); }
    .dock-cell.comm .l { color: var(--accent-600); }
    .dock-cell.comm .chev {
      margin-inline-start: auto; color: var(--text-faint);
    }
    .dock-cell.comm .chev svg { width: 15px; height: 15px; vertical-align: middle; }
    [dir="rtl"] .dock-cell.comm .chev svg { transform: scaleX(-1); }
  </style>
</head>
<body data-nav="home">
  <div class="toolbar">
    <button data-toolbar-lang="en" onclick="I18N.setLang('en')">EN</button>
    <button data-toolbar-lang="ar" onclick="I18N.setLang('ar')">AR</button>
    <button data-toolbar-theme="light" onclick="I18N.setTheme('light')">☀︎</button>
    <button data-toolbar-theme="dark"  onclick="I18N.setTheme('dark')">☾</button>
    <a class="back" href="../welcome/index.html">←</a>
  </div>

  <div class="stage">
    <div class="phone">
      <div class="screen dash-screen">
        <!-- Full-bleed Leaflet + OSM map of Tripoli -->
        <div class="map-fill" id="map-wrap">
          <div id="map" style="width:100%;height:100%;"></div>
        </div>

        <!-- Top-left: notifications -->
        <div class="map-corner">
          <button class="fab bell-dot" aria-label="Notifications">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/>
              <path d="M13.7 21a2 2 0 0 1-3.4 0"/>
            </svg>
          </button>
        </div>

        <!-- Online control (top-centre) — single status pill, Offline by default -->
        <button class="go-pill" id="online-switch" data-state="off" role="switch" aria-checked="false">
          <span class="go-dot"></span>
          <span class="go-label">
            <span class="go-track">
              <span data-i18n="dash.status.off">Offline</span>
              <span data-i18n="dash.status.on">Online</span>
            </span>
          </span>
        </button>

        <!-- Bottom dock: today's earnings + outstanding commission (§2.10) -->
        <div class="map-dock">
          <a class="dock-cell" href="../earnings/index.html">
            <span class="l" data-i18n="dash.today.short">Today</span>
            <span class="v">320<span class="unit" data-i18n="unit.currency">LYD</span></span>
            <span class="sub"><span>15</span> <span data-i18n="dash.trips.short">trips · 6h</span></span>
          </a>
          <a class="dock-cell comm" href="../commission/index.html">
            <span class="l">
              <span data-i18n="dash.commission.l">Commission</span>
              <span class="chev">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M9 6l6 6-6 6"/>
                </svg>
              </span>
            </span>
            <span class="v">48<span class="unit" data-i18n="unit.currency">LYD</span></span>
            <span class="sub" data-i18n="dash.commission.due">Due Sunday</span>
          </a>
        </div>
      </div>
    </div>
  </div>

  <script>
    I18N.register({
      "dash.status.off":   { en: "Offline",                  ar: "غير متصل" },
      "dash.status.on":    { en: "Online",                   ar: "متصل" },
      "dash.today.short":  { en: "Today",                    ar: "اليوم" },
      "dash.trips.short":  { en: "trips · 6h",               ar: "رحلة · 6 س" },
      "dash.commission.l": { en: "Commission",               ar: "العمولة" },
      "dash.commission.due": { en: "Due Sunday",             ar: "تستحق الأحد" },
      "unit.currency":     { en: "LYD",                      ar: "د.ل" },
    });

    // Online control wiring — single pill ⇄ driver-pin pulse ⇄ mock request.
    const sw = document.getElementById('online-switch');

    let driverMarker = null;
    JeeraMap.create('map', {
      center: JeeraMap.TRIPOLI.center,
      zoom: 13,
      onReady(map, L) {
        driverMarker = JeeraMap.pin(L, JeeraMap.TRIPOLI.center, 'driver').addTo(map);
      },
    });

    function setOnline(on) {
      sw.dataset.state = on ? 'on' : 'off';
      sw.setAttribute('aria-checked', String(on));

      const el = driverMarker && driverMarker.getElement && driverMarker.getElement();
      const inner = el && el.querySelector('.jm-pin-driver');
      if (inner) inner.classList.toggle('pulse', on);

      clearTimeout(window._pingT);
      if (on) {
        window._pingT = setTimeout(() => {
          if (sw.dataset.state === 'on') location.href = '../ride-requests/index.html';
        }, 3500);
      }
    }
    sw.addEventListener('click', () => setOnline(sw.dataset.state !== 'on'));
  </script>
</body>
</html>
