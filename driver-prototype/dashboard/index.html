<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Jeera Driver — Dashboard</title>
  <link rel="stylesheet" href="../_shared/app.css" />
  <script src="../_shared/i18n.js"></script>
  <script src="../_shared/frame.js"></script>
  <script src="../_shared/map.js"></script>
  <style>
    .dash-screen {
      padding: 70px 20px 24px;
      gap: 14px;
    }

    /* ── Header (compact) ────────────────────────────────────── */
    .dash-header {
      display: flex; align-items: center; gap: 12px;
    }
    .avatar {
      width: 42px; height: 42px; border-radius: 50%;
      background: linear-gradient(135deg, var(--brand-500), var(--brand-700));
      color: white;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 15px;
      flex: 0 0 auto;
    }
    .dash-header .who { flex: 1; min-width: 0; }
    .dash-header h2 {
      margin: 0; font-size: 16px; font-weight: 700; letter-spacing: -0.01em;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .dash-header .sub { margin: 2px 0 0; font-size: 12px; color: var(--text-muted); }
    .icon-btn {
      width: 40px; height: 40px; border-radius: 12px;
      background: var(--surface); border: 1px solid var(--border);
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--text); cursor: pointer; flex: 0 0 auto;
    }
    .icon-btn svg { width: 20px; height: 20px; }

    /* ── Map container — real Leaflet + OSM tiles ───────────────
       JeeraMap.create() injects Leaflet's CSS and renders into this div.
       Overlays (status pill, earnings chip) sit on top via z-index.   */
    .map-placeholder {
      position: relative;
      flex: 1; min-height: 320px;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .map-placeholder .leaflet-container {
      width: 100%; height: 100%;
    }

    /* Status pill overlay (top-start) — above Leaflet's control pane */
    .map-status {
      position: absolute; top: 12px; inset-inline-start: 12px;
      display: inline-flex; align-items: center; gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.92);
      color: var(--text);
      font-size: 12.5px; font-weight: 600;
      box-shadow: 0 4px 12px rgba(15,23,42,.12);
      backdrop-filter: blur(6px);
      z-index: 1100;
    }
    [data-theme="dark"] .map-status { background: rgba(17,24,39,.85); color: #f8fafc; }
    .map-status .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--text-faint);
      flex: 0 0 auto;
    }
    .map-status.on .dot { background: var(--brand-500); box-shadow: 0 0 0 3px rgba(16,185,129,.25); }

    /* Earnings chip overlay (top-end) — above Leaflet's control pane */
    .map-earn {
      position: absolute; top: 12px; inset-inline-end: 12px;
      padding: 8px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,.92);
      box-shadow: 0 4px 12px rgba(15,23,42,.12);
      backdrop-filter: blur(6px);
      text-align: end;
      z-index: 1100;
      cursor: pointer;
    }
    [data-theme="dark"] .map-earn { background: rgba(17,24,39,.85); }
    .map-earn .l { font-size: 10.5px; color: var(--text-muted); font-weight: 600;
                    letter-spacing: 0.04em; text-transform: uppercase; }
    .map-earn .v {
      font-size: 16px; font-weight: 700; letter-spacing: -0.01em;
      font-variant-numeric: tabular-nums;
      color: var(--text);
    }
    [data-theme="dark"] .map-earn .v { color: #f8fafc; }
    .map-earn .unit { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-inline-start: 3px; }
    .map-earn .sub { font-size: 10.5px; color: var(--text-muted); margin-top: 2px; }

    /* ── Online toggle row ───────────────────────────────────── */
    .online-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .online-row .label { flex: 1; min-width: 0; }
    .online-row .label h4 { margin: 0; font-size: 14px; font-weight: 600; }
    .online-row .label p  { margin: 2px 0 0; font-size: 11.5px; color: var(--text-muted); }

    .switch {
      position: relative; flex: 0 0 auto;
      width: 50px; height: 30px; border-radius: 999px;
      background: var(--surface-2); border: 1px solid var(--border);
      cursor: pointer; transition: background .2s;
    }
    .switch::after {
      content: "";
      position: absolute; top: 2px;
      inset-inline-start: 2px;
      width: 24px; height: 24px; border-radius: 50%;
      background: white;
      box-shadow: 0 2px 4px rgba(0,0,0,.18);
      transition: inset-inline-start .2s;
    }
    .switch.on { background: var(--brand-500); border-color: var(--brand-500); }
    .switch.on::after { inset-inline-start: 22px; }

    /* ── Commission row (compact) ────────────────────────────── */
    .commission-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      cursor: pointer;
    }
    .commission-row .c-ic {
      width: 32px; height: 32px; border-radius: 10px;
      background: rgba(245,158,11,.14); color: var(--accent-600);
      display: inline-flex; align-items: center; justify-content: center;
      flex: 0 0 auto;
    }
    .commission-row .c-ic svg { width: 16px; height: 16px; }
    .commission-row .c-body { flex: 1; min-width: 0; }
    .commission-row .c-l { margin: 0; font-size: 11.5px; color: var(--text-muted); }
    .commission-row .c-v {
      margin: 1px 0 0; font-size: 14.5px; font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .commission-row .c-v .unit { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-inline-start: 4px; }
    .commission-row .chev { color: var(--text-faint); flex: 0 0 auto; }
    .commission-row .chev svg { width: 18px; height: 18px; }
    [dir="rtl"] .commission-row .chev svg { transform: scaleX(-1); }

    .dash-actions .btn + .btn { margin-top: 8px; }

    .todo-chip {
      display: inline-flex; align-items: center; gap: 6px;
      margin: 10px auto 0;
      padding: 5px 11px;
      background: rgba(245,158,11,.12);
      color: var(--accent-600);
      border-radius: 999px;
      font-size: 11px; font-weight: 600;
    }
    .todo-chip::before {
      content: ""; width: 5px; height: 5px; border-radius: 50%;
      background: var(--accent-600);
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button data-toolbar-lang="en" onclick="I18N.setLang('en')">EN</button>
    <button data-toolbar-lang="ar" onclick="I18N.setLang('ar')">AR</button>
    <button data-toolbar-theme="light" onclick="I18N.setTheme('light')">☀︎</button>
    <button data-toolbar-theme="dark"  onclick="I18N.setTheme('dark')">☾</button>
    <a class="back" href="../welcome/index.html">←</a>
  </div>

  <div class="stage">
    <div class="phone">
      <div class="screen dash-screen">
        <!-- Header -->
        <div class="dash-header">
          <div class="avatar">AM</div>
          <div class="who">
            <h2 data-i18n="dash.hello">Ahmad Mohammed</h2>
            <p class="sub" data-i18n="dash.role">Jeera driver</p>
          </div>
          <button class="icon-btn" aria-label="Menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M4 7h16"/><path d="M4 12h16"/><path d="M4 17h16"/>
            </svg>
          </button>
        </div>

        <!-- Real map: Leaflet + OSM/CARTO tiles centred on Tripoli.
             Driver bike-pin is injected by JeeraMap at the centre; status
             pill and earnings chip overlay the map via z-index. -->
        <div class="map-placeholder" id="map-wrap">
          <div id="map" style="width:100%;height:100%;"></div>
          <div class="map-status" id="map-status">
            <span class="dot"></span>
            <span data-i18n="dash.status.off">Offline</span>
          </div>
          <a class="map-earn" href="../trip-history/index.html" aria-label="Today's earnings">
            <div class="l" data-i18n="dash.today.short">Today</div>
            <div class="v">320<span class="unit" data-i18n="unit.currency">LYD</span></div>
            <div class="sub"><span>15</span> <span data-i18n="dash.trips.short">trips · 6h</span></div>
          </a>
        </div>

        <!-- Online toggle -->
        <div class="online-row" id="online-row">
          <div class="label">
            <h4 data-i18n="dash.available">Available for trips</h4>
            <p id="online-state" data-i18n="dash.offline">Flip the switch to start receiving requests.</p>
          </div>
          <button class="switch" id="online-switch" role="switch" aria-checked="false"></button>
        </div>

        <!-- Commission balance (REQUIREMENTS §2.10 — always visible) -->
        <a class="commission-row" href="../commission/index.html">
          <span class="c-ic">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="6" width="18" height="13" rx="2"/>
              <path d="M3 10h18"/><path d="M7 15h4"/>
            </svg>
          </span>
          <div class="c-body">
            <p class="c-l" data-i18n="dash.commission.l">Outstanding commission</p>
            <p class="c-v">48<span class="unit" data-i18n="unit.currency">SAR</span></p>
          </div>
          <span class="chev">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 6l6 6-6 6"/>
            </svg>
          </span>
        </a>

        <div class="dash-actions">
          <button type="button" class="btn btn-primary" id="primary-cta" data-i18n="dash.cta.start">Start receiving requests</button>
          <a class="btn btn-secondary" href="../trip-history/index.html" data-i18n="dash.cta.history">View trip history</a>
        </div>

      </div>
    </div>
  </div>

  <script>
    I18N.register({
      "dash.hello":        { en: "Ahmad Mohammed",                      ar: "أحمد محمد" },
      "dash.role":         { en: "Jeera driver",                        ar: "سائق جيرا" },
      "dash.available":    { en: "Available for trips",                 ar: "متاح للرحلات" },
      "dash.offline":      { en: "Flip the switch to start receiving requests.",
                             ar: "فعّل الزر لبدء استقبال الطلبات." },
      "dash.online":       { en: "Listening for incoming requests…",
                             ar: "جارٍ استقبال الطلبات…" },
      "dash.status.off":   { en: "Offline",                             ar: "غير متاح" },
      "dash.status.on":    { en: "Online",                              ar: "متاح" },
      "dash.city":         { en: "Tripoli",                             ar: "طرابلس" },
      "dash.country":      { en: "Libya",                               ar: "ليبيا" },
      "dash.nb.andalus":   { en: "Hai al-Andalus",                      ar: "حي الأندلس" },
      "dash.nb.gargaresh": { en: "Gargaresh",                           ar: "قرقارش" },
      "dash.nb.souq":      { en: "Souq al-Juma",                        ar: "سوق الجمعة" },
      "dash.today.short":  { en: "Today",                               ar: "اليوم" },
      "dash.trips.short":  { en: "trips · 6h",                          ar: "رحلة · 6 س" },
      "dash.commission.l": { en: "Outstanding commission",              ar: "العمولة المستحقّة" },
      "dash.cta.start":    { en: "Start receiving requests",            ar: "بدء استقبال الطلبات" },
      "dash.cta.stop":     { en: "Stop receiving requests",             ar: "إيقاف استقبال الطلبات" },
      "dash.cta.history":  { en: "View trip history",                   ar: "سجل الرحلات" },
      "unit.currency":     { en: "LYD",                                 ar: "د.ل" },
    });

    // Online toggle wiring — switch ⇄ status pill ⇄ driver-pin pulse ⇄ primary CTA.
    const sw     = document.getElementById('online-switch');
    const cta    = document.getElementById('primary-cta');
    const state  = document.getElementById('online-state');
    const status = document.getElementById('map-status');

    // Real Tripoli map. The driver pin marker is stored so we can toggle
    // its pulse class when going online/offline.
    let driverMarker = null;
    JeeraMap.create('map', {
      center: JeeraMap.TRIPOLI.center,
      zoom: 13,
      onReady(map, L) {
        driverMarker = JeeraMap.pin(L, JeeraMap.TRIPOLI.center, 'driver').addTo(map);
      },
    });

    function setOnline(on) {
      sw.classList.toggle('on', on);
      sw.setAttribute('aria-checked', String(on));
      status.classList.toggle('on', on);
      state.setAttribute('data-i18n', on ? 'dash.online' : 'dash.offline');
      cta.setAttribute('data-i18n',   on ? 'dash.cta.stop' : 'dash.cta.start');
      status.querySelector('span:last-child')
            .setAttribute('data-i18n', on ? 'dash.status.on' : 'dash.status.off');
      I18N.apply();
      // Toggle the driver pin's pulse class (icon element may not exist yet
      // if Leaflet is still bootstrapping — guard).
      const el = driverMarker && driverMarker.getElement
                 && driverMarker.getElement();
      const inner = el && el.querySelector('.jm-pin-driver');
      if (inner) inner.classList.toggle('pulse', on);

      clearTimeout(window._pingT);
      if (on) {
        window._pingT = setTimeout(() => {
          if (sw.classList.contains('on')) {
            location.href = '../ride-requests/index.html';
          }
        }, 3500);
      }
    }
    sw.addEventListener('click',  () => setOnline(!sw.classList.contains('on')));
    cta.addEventListener('click', () => setOnline(!sw.classList.contains('on')));
  </script>
</body>
</html>
