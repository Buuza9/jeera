<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Djera Driver — Dashboard</title>
  <link rel="stylesheet" href="../_shared/app.css" />
  <script src="../_shared/i18n.js"></script>
  <script src="../_shared/frame.js"></script>
  <script src="../_shared/navbar.js"></script>
  <script src="../_shared/map.js"></script>
  <style>
    /* Full-bleed map dashboard — matches claude-design-mockups (switch variant). */
    .dash-screen { padding: 0; gap: 0; position: relative; overflow: hidden; }

    /* Map fills everything; isolation keeps Leaflet panes below the status bar. */
    .map-fill { position: absolute; inset: 0; z-index: 0; isolation: isolate; }
    .map-fill .leaflet-container { width: 100%; height: 100%; }

    /* Top overlay row: avatar (start) · bell (end) */
    .dash-top {
      position: absolute; top: 64px; inset-inline: 16px; z-index: 10;
      display: flex; align-items: center; gap: 10px;
    }
    .dash-top .grow { flex: 1; }
    .av-fab {
      width: 44px; height: 44px; border-radius: 50%; flex: 0 0 auto;
      background: var(--brand-600); color: var(--text-onbrand);
      border: 0; font-family: var(--font-display); font-weight: 700; font-size: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow-md); cursor: pointer; text-decoration: none;
    }
    .bell-wrap { position: relative; flex: 0 0 auto; }
    .bell-wrap .dot {
      position: absolute; top: 8px; inset-inline-end: 10px;
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent-600); border: 2px solid var(--bg);
    }

    /* Greeting card with the online toggle inside */
    .greet-card {
      position: absolute; top: 120px; inset-inline: 16px; z-index: 10;
      padding: 16px;
    }
    .greet-head { margin-bottom: 12px; }
    .greet-head .eyebrow { margin-bottom: 2px; }
    .greet-head .h2 { font-size: 20px; }

    /* Online toggle — "switch" variant (labeled row + switch) */
    .go-switch {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; cursor: pointer;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-sm);
    }
    .go-switch .dot {
      width: 12px; height: 12px; border-radius: 50%; flex: 0 0 auto;
      background: var(--text-faint);
      transition: background .2s;
    }
    .go-switch.on .dot {
      background: var(--brand-500);
      box-shadow: 0 0 0 4px oklch(from var(--brand-500) l c h / .25);
      animation: pulse-ring 2s var(--ease-out) infinite;
    }
    .go-switch .txt { flex: 1; min-width: 0; }
    .go-switch .txt .t { font-size: 15px; font-weight: 600; }
    .go-switch .txt .s { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
    .sw {
      position: relative; flex: 0 0 auto;
      width: 50px; height: 30px; border-radius: 999px;
      background: var(--surface-3); border: 0;
      transition: background .2s;
    }
    .sw::after {
      content: ""; position: absolute; top: 3px; inset-inline-start: 3px;
      width: 24px; height: 24px; border-radius: 50%; background: #fff;
      box-shadow: 0 2px 4px rgba(0,0,0,.2);
      transition: inset-inline-start .2s var(--ease-out);
    }
    .go-switch.on .sw { background: var(--brand-600); }
    .go-switch.on .sw::after { inset-inline-start: 23px; }

    /* Map controls — float just above the dock, trailing side */
    .map-ctrls {
      position: absolute; inset-inline-end: 16px; bottom: 200px; z-index: 11;
      display: flex; gap: 8px;
    }

    /* Bottom dock: today + commission */
    .dock {
      position: absolute; inset-inline: 16px; bottom: 100px; z-index: 10;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(8px);
      display: flex; overflow: hidden;
    }
    .dock-cell {
      flex: 1; padding: 14px 16px; border: 0; background: transparent;
      color: var(--text); text-align: start; cursor: pointer;
      font-family: inherit; text-decoration: none;
    }
    .dock-cell .lbl {
      font-family: var(--font-mono); font-size: 10px; font-weight: 500;
      letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted);
      margin-bottom: 4px; display: flex; align-items: center; justify-content: space-between;
    }
    .dock-cell .v {
      font-size: 22px; font-weight: 700; letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
    }
    .dock-cell .v .unit { font-size: 12px; color: var(--text-muted); margin-inline-start: 4px; font-weight: 600; }
    .dock-cell .sub { font-size: 11.5px; color: var(--text-faint); margin-top: 2px; }
    .dock-cell.comm .lbl { color: var(--accent-700); }
    .dock-cell.comm .v   { color: var(--accent-700); }
    .dock-cell.comm .lbl svg { width: 12px; height: 12px; }
    [dir="rtl"] .dock-cell.comm .lbl svg { transform: scaleX(-1); }
    .dock-div { width: 1px; background: var(--border); }
  </style>
</head>
<body data-nav="home">
  <div class="toolbar">
    <button data-toolbar-lang="en" onclick="I18N.setLang('en')">EN</button>
    <button data-toolbar-lang="ar" onclick="I18N.setLang('ar')">AR</button>
    <button data-toolbar-theme="light" onclick="I18N.setTheme('light')">☀︎</button>
    <button data-toolbar-theme="dark"  onclick="I18N.setTheme('dark')">☾</button>
    <a class="back" href="../welcome/index.html">←</a>
  </div>

  <div class="stage">
    <div class="phone">
      <div class="screen dash-screen">
        <!-- Full-bleed Leaflet + OSM map of Tripoli -->
        <div class="map-fill" id="map-wrap">
          <div id="map" style="width:100%;height:100%;"></div>
        </div>

        <!-- Top overlay: avatar (start) · bell (end) -->
        <div class="dash-top">
          <a class="av-fab" href="../profile/index.html" aria-label="Profile">AM</a>
          <div class="grow"></div>
          <button class="fab bell-wrap" aria-label="Notifications">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/>
              <path d="M13.7 21a2 2 0 0 1-3.4 0"/>
            </svg>
            <span class="dot"></span>
          </button>
        </div>

        <!-- Greeting card + online toggle -->
        <div class="greet-card card card-elev">
          <div class="greet-head">
            <div class="eyebrow" data-i18n="dash.weather">Tripoli · 26°</div>
            <h2 class="h2" data-i18n="dash.greet">Salaam, Ahmad</h2>
          </div>
          <div class="go-switch" id="online-switch" role="switch" aria-checked="false">
            <span class="dot"></span>
            <div class="txt">
              <div class="t" id="go-title" data-i18n="dash.online">Go online</div>
              <div class="s" id="go-sub" data-i18n="dash.online.tap">Tap to start receiving requests</div>
            </div>
            <span class="sw" aria-hidden="true"></span>
          </div>
        </div>

        <!-- Map controls -->
        <div class="map-ctrls">
          <button class="fab" aria-label="Layers">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 3l9 5-9 5-9-5 9-5z"/><path d="M3 13l9 5 9-5"/><path d="M3 18l9 5 9-5"/>
            </svg>
          </button>
          <button class="fab" aria-label="Recenter">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path d="M3 11l18-8-8 18-2-8-8-2z"/>
            </svg>
          </button>
        </div>

        <!-- Bottom dock: today's earnings + outstanding commission (§2.10) -->
        <div class="dock">
          <a class="dock-cell" href="../earnings/index.html">
            <div class="lbl"><span data-i18n="dash.today">Today</span></div>
            <div class="v">320<span class="unit" data-i18n="unit.currency">LYD</span></div>
            <div class="sub">15 <span data-i18n="dash.trips">trips</span> · 6<span data-i18n="unit.hr">h</span></div>
          </a>
          <div class="dock-div"></div>
          <a class="dock-cell comm" href="../commission/index.html">
            <div class="lbl">
              <span data-i18n="dash.commission">Commission</span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
            </div>
            <div class="v">48<span class="unit" data-i18n="unit.currency">LYD</span></div>
            <div class="sub" data-i18n="dash.due">Due Sunday</div>
          </a>
        </div>
      </div>
    </div>
  </div>

  <script>
    I18N.register({
      "dash.weather":    { en: "Tripoli · 26°",                    ar: "طرابلس · 26°" },
      "dash.greet":      { en: "Salaam, Ahmad",                    ar: "مرحباً، أحمد" },
      "dash.online":     { en: "Go online",                        ar: "ابدأ العمل" },
      "dash.online.on":  { en: "You're online",                    ar: "أنت متصل الآن" },
      "dash.online.tap": { en: "Tap to start receiving requests",  ar: "اضغط لبدء استقبال الطلبات" },
      "dash.online.lstn":{ en: "Listening for requests…",          ar: "جارٍ استقبال الطلبات…" },
      "dash.today":      { en: "Today",                            ar: "اليوم" },
      "dash.trips":      { en: "trips",                            ar: "رحلة" },
      "dash.commission": { en: "Commission",                       ar: "العمولة" },
      "dash.due":        { en: "Due Sunday",                       ar: "تستحق الأحد" },
      "unit.currency":   { en: "LYD",                              ar: "د.ل" },
      "unit.hr":         { en: "h",                                ar: "س" },
    });

    // Online toggle wiring — switch row ⇄ driver-pin pulse ⇄ mock request.
    const sw    = document.getElementById('online-switch');
    const title = document.getElementById('go-title');
    const sub   = document.getElementById('go-sub');

    let driverMarker = null;
    JeeraMap.create('map', {
      center: JeeraMap.TRIPOLI.center,
      zoom: 13,
      onReady(map, L) {
        driverMarker = JeeraMap.pin(L, JeeraMap.TRIPOLI.center, 'driver').addTo(map);
      },
    });

    function setOnline(on) {
      sw.classList.toggle('on', on);
      sw.setAttribute('aria-checked', String(on));
      title.setAttribute('data-i18n', on ? 'dash.online.on' : 'dash.online');
      sub.setAttribute('data-i18n',   on ? 'dash.online.lstn' : 'dash.online.tap');
      I18N.apply();

      const el = driverMarker && driverMarker.getElement && driverMarker.getElement();
      const inner = el && el.querySelector('.jm-pin-driver');
      if (inner) inner.classList.toggle('pulse', on);

      clearTimeout(window._pingT);
      if (on) {
        window._pingT = setTimeout(() => {
          if (sw.classList.contains('on')) location.href = '../ride-requests/index.html';
        }, 3000);
      }
    }
    sw.addEventListener('click', () => setOnline(!sw.classList.contains('on')));
  </script>
</body>
</html>
