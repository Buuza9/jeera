<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Djera Driver — Incoming request</title>
  <link rel="stylesheet" href="../_shared/app.css" />
  <script src="../_shared/i18n.js"></script>
  <script src="../_shared/frame.js"></script>
  <script src="../_shared/map.js"></script>
  <style>
    .req-screen { padding: 0; position: relative; overflow: hidden; }
    .map-fill { position: absolute; inset: 0; z-index: 0; isolation: isolate; }
    .map-fill .leaflet-container { width: 100%; height: 100%; }

    /* Notice pill */
    .notice {
      position: absolute; top: 70px; inset-inline: 18px; z-index: 30;
      display: flex; align-items: center; gap: 10px;
      padding: 11px 14px;
      background: var(--surface); border-radius: var(--r-md);
      box-shadow: var(--shadow-md); backdrop-filter: blur(8px);
      animation: notice-in .35s var(--ease-spring) both;
    }
    .notice .dot {
      width: 10px; height: 10px; border-radius: 50%; flex: 0 0 auto;
      background: var(--brand-500); animation: pulse-ring 1.6s var(--ease-out) infinite;
    }
    .notice .nt { flex: 1; min-width: 0; }
    .notice .nt .t { font-size: 13.5px; font-weight: 700; }
    .notice .nt .s { font-size: 11.5px; color: var(--text-faint); margin-top: 1px; }
    @keyframes notice-in { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* Bottom sheet */
    .sheet {
      position: absolute; inset-inline: 0; bottom: 0; z-index: 20;
      background: var(--bg);
      border-radius: 28px 28px 0 0;
      padding: 8px 22px 30px;
      box-shadow: 0 -16px 40px rgba(20,18,12,.18);
      animation: sheet-up .42s var(--ease-spring) both;
    }
    .grabber { width: 44px; height: 5px; border-radius: 999px; background: var(--surface-3); margin: 4px auto 12px; }

    .sheet-head { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
    .sheet-head .h2 { font-size: 22px; }
    .sheet-head .small { margin-top: 4px; }

    /* Countdown ring */
    .cdr { position: relative; width: 56px; height: 56px; flex: 0 0 auto; }
    .cdr svg { width: 56px; height: 56px; transform: rotate(-90deg); }
    .cdr .track { fill: none; stroke: var(--surface-2); stroke-width: 4.2; }
    .cdr .prog { fill: none; stroke: var(--brand-600); stroke-width: 4.2; stroke-linecap: round; transition: stroke-dashoffset .9s linear, stroke .25s; }
    .cdr.low  .prog { stroke: var(--accent-600); }
    .cdr.crit .prog { stroke: var(--danger); }
    .cdr .n {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums;
    }

    /* Route card */
    .route { position: relative; padding: 18px; margin-bottom: 14px; }
    .route .track-line { position: absolute; inset-inline-start: 24px; top: 34px; bottom: 34px; width: 2px; background: var(--border); }
    .route .stop { display: flex; gap: 14px; align-items: flex-start; padding-block: 4px; }
    .route .stop .pin { width: 14px; height: 14px; margin-top: 4px; flex: 0 0 auto; }
    .route .stop .pin.from { border-radius: 50%; background: var(--brand-600); box-shadow: 0 0 0 4px var(--brand-50); }
    .route .stop .pin.to { border-radius: 3px; background: var(--terra-500); box-shadow: 0 0 0 4px oklch(from var(--terra-500) l c h / .15); }
    [data-theme="dark"] .route .stop .pin.from { box-shadow: 0 0 0 4px oklch(from var(--brand-500) l c h / .18); }
    .route .stop .info { flex: 1; min-width: 0; }
    .route .stop .info .addr { font-size: 14.5px; font-weight: 600; margin-top: 2px; }
    .route .stop .dist { font-size: 11.5px; font-weight: 600; color: var(--text-faint); }
    .route .gap { height: 16px; }

    /* Metrics */
    .metrics { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 16px; }
    .metric { padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--r-md); text-align: center; background: var(--surface); }
    .metric.hi { background: var(--brand-50); border-color: oklch(from var(--brand-500) l c h / .35); }
    [data-theme="dark"] .metric.hi { background: oklch(from var(--brand-500) l c h / .12); }
    .metric .v { font-size: 18px; font-weight: 700; letter-spacing: -0.018em; font-variant-numeric: tabular-nums; }
    .metric.hi .v { color: var(--brand-700); }
    .metric .v .u { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-inline-start: 3px; }
    .metric .l { font-size: 11.5px; color: var(--text-faint); margin-top: 2px; }
  </style>
</head>
<body>
  <div class="toolbar">
    <button data-toolbar-lang="en" onclick="I18N.setLang('en')">EN</button>
    <button data-toolbar-lang="ar" onclick="I18N.setLang('ar')">AR</button>
    <button data-toolbar-theme="light" onclick="I18N.setTheme('light')">☀︎</button>
    <button data-toolbar-theme="dark"  onclick="I18N.setTheme('dark')">☾</button>
    <a class="back" href="../dashboard/index.html">←</a>
  </div>

  <div class="stage">
    <div class="phone">
      <div class="screen req-screen">
        <div class="map-fill"><div id="map" style="width:100%;height:100%;"></div></div>

        <!-- Notice pill -->
        <div class="notice">
          <span class="dot"></span>
          <div class="nt">
            <div class="t" data-i18n="req.incoming">Incoming request</div>
            <div class="s" data-i18n="req.sub">Confirm within the timer</div>
          </div>
          <span class="badge badge-brand">
            <svg viewBox="0 0 24 24" width="10" height="10" fill="currentColor"><path d="M12 3l2.7 5.7 6.3.6-4.8 4.3 1.5 6.2L12 16.9l-5.7 2.9 1.5-6.2L3 9.3l6.3-.6L12 3z"/></svg>
            4.8
          </span>
        </div>

        <!-- Bottom sheet -->
        <div class="sheet">
          <div class="grabber"></div>
          <div class="sheet-head">
            <div style="flex:1">
              <h2 class="h2" data-i18n="req.incoming">Incoming request</h2>
              <p class="small" data-i18n="req.sub">Confirm within the timer</p>
            </div>
            <div class="cdr" id="cdr">
              <svg viewBox="0 0 56 56">
                <circle class="track" cx="28" cy="28" r="23.5"/>
                <circle class="prog" id="cdr-prog" cx="28" cy="28" r="23.5"/>
              </svg>
              <span class="n" id="cdr-n">15</span>
            </div>
          </div>

          <!-- Route card -->
          <div class="card route">
            <div class="track-line"></div>
            <div class="stop">
              <span class="pin from"></span>
              <div class="info">
                <div class="eyebrow" data-i18n="req.pickup">Pickup</div>
                <div class="addr" data-i18n="req.pickup.addr">Hai al-Andalus, Tripoli</div>
              </div>
              <span class="dist">1.5 <span data-i18n="unit.km">km</span></span>
            </div>
            <div class="gap"></div>
            <div class="stop">
              <span class="pin to"></span>
              <div class="info">
                <div class="eyebrow" data-i18n="req.dest">Destination</div>
                <div class="addr" data-i18n="req.dest.addr">Gargaresh, Tripoli</div>
              </div>
              <span class="dist">8.5 <span data-i18n="unit.km">km</span></span>
            </div>
          </div>

          <!-- Metrics -->
          <div class="metrics">
            <div class="metric"><div class="v">1.5<span class="u" data-i18n="unit.km">km</span></div><div class="l" data-i18n="req.toRider">To rider</div></div>
            <div class="metric"><div class="v">8.5<span class="u" data-i18n="unit.km">km</span></div><div class="l" data-i18n="req.trip">Trip</div></div>
            <div class="metric hi"><div class="v">25<span class="u" data-i18n="unit.currency">LYD</span></div><div class="l" data-i18n="req.fare">Fare</div></div>
          </div>

          <!-- Actions -->
          <div class="btn-row">
            <a class="btn btn-danger" href="../dashboard/index.html" data-i18n="req.reject">Reject</a>
            <a class="btn btn-primary" style="flex:1.4" href="../active-trip/to-pickup.html" data-i18n="req.accept">Accept</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    I18N.register({
      "req.incoming":   { en: "Incoming request",        ar: "طلب وارد" },
      "req.sub":        { en: "Confirm within the timer", ar: "أكّد قبل انتهاء المؤقّت" },
      "req.pickup":     { en: "Pickup",                   ar: "نقطة الانطلاق" },
      "req.dest":       { en: "Destination",              ar: "الوجهة" },
      "req.pickup.addr":{ en: "Hai al-Andalus, Tripoli",  ar: "حي الأندلس، طرابلس" },
      "req.dest.addr":  { en: "Gargaresh, Tripoli",       ar: "قرقارش، طرابلس" },
      "req.toRider":    { en: "To rider",                 ar: "إلى الراكب" },
      "req.trip":       { en: "Trip",                     ar: "الرحلة" },
      "req.fare":       { en: "Fare",                     ar: "الأجرة" },
      "req.reject":     { en: "Reject",                   ar: "رفض" },
      "req.accept":     { en: "Accept",                   ar: "قبول الرحلة" },
      "unit.km":        { en: "km",                       ar: "كم" },
      "unit.currency":  { en: "LYD",                      ar: "د.ل" },
    });

    // Real Tripoli map: driver near pickup, pickup + drop-off pins, route.
    const T = JeeraMap.TRIPOLI;
    JeeraMap.create('map', {
      center: T.center, zoom: 13,
      onReady(map, L) {
        JeeraMap.route(L, [T.andalus, T.center, T.gargaresh]).addTo(map);
        JeeraMap.pin(L, T.center, 'driver', { pulse: true }).addTo(map);
        JeeraMap.pin(L, T.andalus, 'rider', { label: I18N.t('req.pickup') }).addTo(map);
        JeeraMap.pin(L, T.gargaresh, 'dest', { label: I18N.t('req.dest') }).addTo(map);
      },
    });

    // Countdown ring (15s) — brand → amber (≤7) → red (≤3); 0 returns to dashboard.
    const R = 23.5, C = 2 * Math.PI * R;
    const prog = document.getElementById('cdr-prog');
    const numEl = document.getElementById('cdr-n');
    const cdr = document.getElementById('cdr');
    prog.style.strokeDasharray = C;
    let n = 15;
    function tick() {
      const pct = n / 15;
      prog.style.strokeDashoffset = C * (1 - pct);
      numEl.textContent = n;
      cdr.classList.toggle('low', n <= 7 && n > 3);
      cdr.classList.toggle('crit', n <= 3);
      if (n <= 0) { location.href = '../dashboard/index.html'; return; }
      n -= 1;
      window._cd = setTimeout(tick, 1000);
    }
    tick();
  </script>
</body>
</html>
