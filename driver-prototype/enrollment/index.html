<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Djera Driver — Enrollment</title>
  <link rel="stylesheet" href="../_shared/app.css" />
  <script src="../_shared/i18n.js"></script>
  <script src="../_shared/frame.js"></script>
</head>
<body>
  <div class="toolbar">
    <button data-toolbar-lang="en" onclick="I18N.setLang('en')">EN</button>
    <button data-toolbar-lang="ar" onclick="I18N.setLang('ar')">AR</button>
    <button data-toolbar-theme="light" onclick="I18N.setTheme('light')">☀︎</button>
    <button data-toolbar-theme="dark"  onclick="I18N.setTheme('dark')">☾</button>
  </div>

  <div class="stage">
    <div class="phone">
      <div class="screen">
        <div class="brand-mark">
          <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" width="36" height="36">
            <path d="M30 8 L30 30 a8 8 0 0 1 -16 0" />
            <path d="M22 8 L36 8" opacity=".75"/>
          </svg>
        </div>
        <h1 class="title" data-i18n="enroll.title">Register as a driver</h1>
        <p class="subtitle" data-i18n="enroll.subtitle">Complete the form to start.</p>

        <form onsubmit="event.preventDefault(); window.location.href='./pending.html'">
          <div class="field">
            <label data-i18n="enroll.fullName">Full name</label>
            <input type="text" data-i18n-placeholder="enroll.fullName.ph" placeholder="e.g. Ahmed Mohammed" />
          </div>

          <div class="field">
            <label data-i18n="enroll.phone">Phone number</label>
            <input type="tel" inputmode="tel" placeholder="+218 9X XXX XXXX" />
          </div>

          <div class="field">
            <label data-i18n="enroll.nationalId">National ID number</label>
            <input type="text" inputmode="numeric" />
          </div>

          <div class="field">
            <label data-i18n="enroll.licenseNo">Driver's license number</label>
            <input type="text" inputmode="numeric" />
          </div>

          <div class="field">
            <label data-i18n="enroll.plate">Motorbike plate number</label>
            <input type="text" />
          </div>

          <p class="section-label" data-i18n="enroll.documents">Documents</p>

          <div class="field">
            <label data-i18n="enroll.idPhoto">ID photo</label>
            <div class="upload" onclick="this.classList.toggle('done')">
              <span class="ic">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                  <path d="M12 16V4"/>
                  <path d="M6 10l6-6 6 6"/>
                  <path d="M4 20h16"/>
                </svg>
              </span>
              <span data-i18n="enroll.upload.tap">Tap to upload photo</span>
            </div>
          </div>

          <div class="field">
            <label data-i18n="enroll.licensePhoto">License photo</label>
            <div class="upload" onclick="this.classList.toggle('done')">
              <span class="ic">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                  <path d="M12 16V4"/>
                  <path d="M6 10l6-6 6 6"/>
                  <path d="M4 20h16"/>
                </svg>
              </span>
              <span data-i18n="enroll.upload.tap">Tap to upload photo</span>
            </div>
          </div>

          <button class="btn btn-primary" type="submit" data-i18n="enroll.submit">Submit for approval</button>
          <div class="divider" data-i18n="common.or">or</div>
          <a href="../index.html" class="btn btn-secondary" data-i18n="enroll.alreadyDriver">Already a driver? Sign in</a>
        </form>
      </div>
    </div>
  </div>

  <script>
    I18N.register({
      "nav.pending":          { en: "Pending state →",      ar: "حالة قيد المراجعة ←" },
      "enroll.title":         { en: "Register as a driver", ar: "التسجيل كسائق" },
      "enroll.subtitle":      { en: "Complete the form to start.", ar: "أكمل البيانات للبدء" },
      "enroll.fullName":      { en: "Full name",            ar: "الاسم الكامل" },
      "enroll.fullName.ph":   { en: "e.g. Ahmed Mohammed",  ar: "مثال: أحمد محمد" },
      "enroll.phone":         { en: "Phone number",         ar: "رقم الهاتف" },
      "enroll.nationalId":    { en: "National ID number",   ar: "رقم الهوية" },
      "enroll.licenseNo":     { en: "Driver's license number", ar: "رقم رخصة القيادة" },
      "enroll.plate":         { en: "Motorbike plate number", ar: "رقم لوحة الدراجة" },
      "enroll.documents":     { en: "Documents",            ar: "المستندات" },
      "enroll.idPhoto":       { en: "ID photo",             ar: "صورة الهوية" },
      "enroll.licensePhoto":  { en: "License photo",        ar: "صورة رخصة القيادة" },
      "enroll.upload.tap":    { en: "Tap to upload photo",  ar: "اضغط لرفع الصورة" },
      "enroll.submit":        { en: "Submit for approval",  ar: "إرسال للمراجعة" },
      "enroll.alreadyDriver": { en: "Already a driver? Sign in", ar: "سائق مسجّل؟ تسجيل الدخول" },
      "common.or":            { en: "or",                   ar: "أو" },
    });
  </script>
</body>
</html>
