<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Djera Driver — Help & support</title>
  <link rel="stylesheet" href="../_shared/app.css" />
  <script src="../_shared/i18n.js"></script>
  <script src="../_shared/frame.js"></script>
  <style>
    /* SOS card */
    .sos {
      display: flex; align-items: center; gap: 14px; width: 100%;
      padding: 16px; border-radius: var(--r-lg); cursor: pointer; text-align: start;
      font-family: inherit; color: var(--text-onbrand); border: 0;
      background: linear-gradient(140deg, var(--danger), oklch(from var(--danger) calc(l - 0.08) c h) 90%);
      box-shadow: 0 12px 30px oklch(from var(--danger) l c h / .32);
    }
    .sos .ic {
      width: 48px; height: 48px; border-radius: 14px; flex: 0 0 auto;
      background: oklch(1 0 0 / .18); display: flex; align-items: center; justify-content: center;
    }
    .sos .ic svg { width: 24px; height: 24px; }
    .sos .body { flex: 1; min-width: 0; }
    .sos .body .t { font-size: 16px; font-weight: 700; color: #fff; }
    .sos .body .s { font-size: 12.5px; opacity: .92; margin-top: 2px; line-height: 1.4; color: #fff; }

    .sec-label { margin: 4px 0 10px 4px; }

    /* Contact rows */
    .c-list { padding: 4px; }
    .c-row { display: flex; align-items: center; gap: 14px; width: 100%; padding: 13px 14px; color: var(--text); text-decoration: none; border: 0; background: transparent; font-family: inherit; text-align: start; cursor: pointer; }
    .c-row + .c-row { border-top: 1px solid var(--hairline); }
    .c-row .ic { width: 38px; height: 38px; border-radius: var(--r-sm); flex: 0 0 auto; background: var(--brand-50); color: var(--brand-700); display: flex; align-items: center; justify-content: center; }
    [data-theme="dark"] .c-row .ic { background: oklch(from var(--brand-500) l c h / .18); color: var(--brand-200); }
    .c-row .ic svg { width: 18px; height: 18px; }
    .c-row .body { flex: 1; min-width: 0; }
    .c-row .body .t { font-size: 14px; font-weight: 600; }
    .c-row .body .s { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
    .c-row .chev { color: var(--text-faint); }
    [dir="rtl"] .c-row .chev svg { transform: scaleX(-1); }

    /* FAQ accordion */
    .faq { padding: 0; overflow: hidden; }
    .faq-item { border-bottom: 1px solid var(--hairline); }
    .faq-item:last-child { border-bottom: 0; }
    .faq-q {
      display: flex; align-items: center; gap: 12px; width: 100%;
      padding: 15px 16px; border: 0; background: transparent; cursor: pointer;
      color: var(--text); text-align: start; font-family: inherit;
      font-size: 14px; font-weight: 600;
    }
    .faq-q .q { flex: 1; min-width: 0; }
    .faq-q .ch { color: var(--text-faint); transition: transform .2s var(--ease-out); flex: 0 0 auto; }
    .faq-item.open .faq-q .ch { transform: rotate(180deg); }
    .faq-a { max-height: 0; overflow: hidden; transition: max-height .25s var(--ease-out); }
    .faq-item.open .faq-a { max-height: 240px; }
    .faq-a p { margin: 0; padding: 0 16px 16px; font-size: 13.5px; color: var(--text-muted); line-height: 1.55; }

    .ver { text-align: center; font-size: 11px; color: var(--text-faint); margin-top: 4px; }
  </style>
</head>
<body>
  <div class="toolbar">
    <button data-toolbar-lang="en" onclick="I18N.setLang('en')">EN</button>
    <button data-toolbar-lang="ar" onclick="I18N.setLang('ar')">AR</button>
    <button data-toolbar-theme="light" onclick="I18N.setTheme('light')">☀︎</button>
    <button data-toolbar-theme="dark"  onclick="I18N.setTheme('dark')">☾</button>
    <a class="back" href="../profile/index.html">←</a>
  </div>

  <div class="stage">
    <div class="phone">
      <div class="screen">
        <div class="appbar">
          <a class="ab-btn" href="../profile/index.html" aria-label="Back">
            <svg class="chev chev-end" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg>
          </a>
          <div style="flex:1;min-width:0"><div class="ab-title" data-i18n="sup.title">Help &amp; support</div></div>
        </div>

        <div class="stack stack-4" style="flex:1">
          <!-- SOS -->
          <button class="sos">
            <span class="ic">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a9 9 0 0 0-9 9c0 6 9 11 9 11s9-5 9-11a9 9 0 0 0-9-9z"/><path d="M12 8v4M12 16h.01"/></svg>
            </span>
            <span class="body">
              <span class="t" data-i18n="sup.sos">Emergency SOS</span>
              <span class="s" data-i18n="sup.sos.sub">Alert emergency services and the Djera safety team.</span>
            </span>
          </button>

          <!-- Contact -->
          <div>
            <div class="eyebrow sec-label" data-i18n="sup.contact">Contact us</div>
            <div class="card c-list">
              <a class="c-row" href="tel:+218000000000">
                <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3.1-8.6A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.4 1.8.7 2.7a2 2 0 0 1-.5 2.1L8 9.7a16 16 0 0 0 6 6l1.2-1.2a2 2 0 0 1 2.1-.5c.9.3 1.8.6 2.7.7a2 2 0 0 1 1.7 2.2z"/></svg></span>
                <span class="body"><span class="t" data-i18n="sup.call">Call support center</span><span class="s" data-i18n="sup.call.sub">7am–11pm, every day</span></span>
                <span class="chev"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span>
              </a>
              <button class="c-row">
                <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 0 1-12 7.6L3 21l1.9-6A8.4 8.4 0 1 1 21 11.5z"/></svg></span>
                <span class="body"><span class="t" data-i18n="sup.chat">Live chat</span><span class="s" data-i18n="sup.chat.sub">Typically replies in a few minutes</span></span>
                <span class="chev"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span>
              </button>
              <a class="c-row" href="mailto:drivers@djera.ly">
                <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg></span>
                <span class="body"><span class="t" data-i18n="sup.email">Email us</span><span class="s">drivers@djera.ly</span></span>
                <span class="chev"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span>
              </a>
            </div>
          </div>

          <!-- FAQ -->
          <div>
            <div class="eyebrow sec-label" data-i18n="sup.faq">Frequently asked</div>
            <div class="card faq" id="faq"></div>
          </div>

          <div class="ver" data-i18n="sup.version">Djera Driver · v0.1 (prototype)</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    I18N.register({
      "sup.title":     { en: "Help & support",     ar: "المساعدة والدعم" },
      "sup.sos":       { en: "Emergency SOS",       ar: "نداء استغاثة" },
      "sup.sos.sub":   { en: "Alert emergency services and the Djera safety team.",
                         ar: "تنبيه خدمات الطوارئ وفريق سلامة دجيرا." },
      "sup.contact":   { en: "Contact us",          ar: "تواصل معنا" },
      "sup.call":      { en: "Call support center", ar: "اتصل بمركز الدعم" },
      "sup.call.sub":  { en: "7am–11pm, every day", ar: "7ص–11م، كل يوم" },
      "sup.chat":      { en: "Live chat",           ar: "محادثة مباشرة" },
      "sup.chat.sub":  { en: "Typically replies in a few minutes", ar: "يردّ عادةً خلال دقائق" },
      "sup.email":     { en: "Email us",            ar: "راسلنا" },
      "sup.faq":       { en: "Frequently asked",    ar: "الأسئلة الشائعة" },
      "sup.version":   { en: "Djera Driver · v0.1 (prototype)", ar: "دجيرا للسائق · v0.1 (نموذج)" },

      "sup.q1": { en: "How and when do I get paid?", ar: "كيف ومتى أتقاضى أجري؟" },
      "sup.a1": { en: "Riders pay you in cash at the end of each trip. Your earnings are yours immediately — Djera only collects its commission separately.",
                  ar: "يدفع لك الركّاب نقدًا في نهاية كل رحلة. أرباحك لك فورًا — تحصّل دجيرا عمولتها بشكل منفصل." },
      "sup.q2": { en: "How is commission calculated?", ar: "كيف تُحتسب العمولة؟" },
      "sup.a2": { en: "A fixed percentage of each trip fare is added to your outstanding commission balance, which you settle weekly or before the cap.",
                  ar: "تُضاف نسبة ثابتة من أجرة كل رحلة إلى رصيد عمولتك المستحق، وتسوّيه أسبوعيًا أو قبل بلوغ الحد." },
      "sup.q3": { en: "What if a rider doesn't show up?", ar: "ماذا لو لم يحضر الراكب؟" },
      "sup.a3": { en: "After waiting at the pickup, you can cancel as a no-show. It won't count against your cancellation rate.",
                  ar: "بعد الانتظار في نقطة الالتقاء، يمكنك الإلغاء كعدم حضور. لن يُحتسب ذلك ضمن معدّل إلغائك." },
      "sup.q4": { en: "How do I update my documents?", ar: "كيف أحدّث مستنداتي؟" },
      "sup.a4": { en: "Go to Profile → Documents to re-upload your ID or license before they expire to keep driving without interruption.",
                  ar: "اذهب إلى الملف الشخصي ← المستندات لإعادة رفع هويتك أو رخصتك قبل انتهائها لمواصلة العمل دون انقطاع." },
      "sup.q5": { en: "How do I go offline?", ar: "كيف أتوقّف عن استقبال الطلبات؟" },
      "sup.a5": { en: "Tap the online toggle on the home map. You'll stop receiving new requests once your current trip ends.",
                  ar: "اضغط زر الاتصال على خريطة الرئيسية. ستتوقف عن استقبال الطلبات الجديدة بمجرد انتهاء رحلتك الحالية." },
    });

    const FAQ = [['sup.q1','sup.a1'],['sup.q2','sup.a2'],['sup.q3','sup.a3'],['sup.q4','sup.a4'],['sup.q5','sup.a5']];
    const CH = '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>';
    document.getElementById('faq').innerHTML = FAQ.map(([q, a]) =>
      `<div class="faq-item">
        <button class="faq-q"><span class="q" data-i18n="${q}"></span><span class="ch">${CH}</span></button>
        <div class="faq-a"><p data-i18n="${a}"></p></div>
      </div>`).join('');
    I18N.apply();
    document.querySelectorAll('.faq-q').forEach((b) => b.addEventListener('click', () => {
      b.parentElement.classList.toggle('open');
    }));
  </script>
</body>
</html>
